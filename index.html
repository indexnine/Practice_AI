"The passage of GDPR in 2018, which forced AI companies to develop privacy-compliant training methodologies",
"The introduction of the transformer architecture in 2017, which enabled faster training and became the foundation for all subsequent large language models"],
correct:[3],cat:"recall",
exp:"The course's Module 1 timeline explicitly identifies the 2017 transformer architecture as the foundational technical development. It enabled the training of GPT-3 at 175B parameters in 2020, which then demonstrated few-shot learning capabilities — setting the stage for ChatGPT in 2022. Smartphones, OpenAI's founding, and GDPR are not identified by the course as the most foundational development in this period."},
{id:"aq1q5",type:"single",q:"The course warns about placing AI in specific categories: 'great at,' 'risky,' and 'can't do.' Which placement does the course make for 'drafting first versions of documents for human review'?",
opts:["Great at — this is precisely the high-volume, generative, reviewable task that AI consistently accelerates",
"Risky — first drafts set the direction of a document and AI-generated first drafts can introduce bias into the final output",
"Can't do — effective first drafts require context about the audience and purpose that AI cannot have by default",
"Risky — document drafts may be shared externally and require the accuracy standards that only human authorship can provide"],
correct:[0],cat:"recall",
exp:"The course places 'drafting first versions of documents for human review' explicitly in the 'great at' category in Module 1. This is a core AI strength: generative, high-volume, with human review as the quality gate. The course's framework explicitly endorses this workflow — AI draft, human review, human owns the final output."},
],
2:[
{id:"aq2q1",type:"single",q:"A team uses the prompt: 'You are a procurement specialist. Extract supplier name, delivery date, and contract value from this document and return as a JSON object. Document: [text].' Which CRAFT elements does this prompt successfully include?",
opts:["Role and Format only — the task is implied but not stated, and context and constraints are missing","Role (procurement specialist), Action (extract specified fields), Format (JSON object), and implicit Context (the document text) — all five elements are represented or implied","All five CRAFT elements are fully and explicitly stated with equal specificity throughout the prompt","Context and Constraints only — the role and format are implied by the JSON request but not explicitly stated"],
correct:[1],cat:"analytical",
exp:"Analysing against CRAFT: Role (procurement specialist — explicit), Action/Task (extract supplier name, delivery date, contract value — explicit), Context (the document text — provided), Format (JSON object — explicit), Constraints (specific fields to extract — explicit). This is a well-constructed prompt covering all five elements. The course would characterise this as a strong example of the CRAFT framework applied."},
{id:"aq2q2",type:"single",q:"The course's pattern library includes 'Rewrite.' The starter given is: 'Rewrite this [text] in [style/format]. Keep the key points but change [specific aspect].' When is this pattern most valuable?",
opts:["When the original text is factually incorrect and needs to be completely replaced with accurate information",
"When the user wants to combine multiple documents into a single coherent version for distribution",
"When the content is correct but needs to be adapted for a different audience, format, or communication style without losing the underlying substance",
"When the text needs to be translated from one language into another while preserving technical terminology"],
correct:[2],cat:"recall",
exp:"The course's Rewrite pattern is specifically for adapting content for a different audience, format, or style while preserving the substantive content. 'Keep the key points but change [specific aspect]' makes the preservation of content and change of form explicit. Factual correction, document combination, and translation are separate tasks handled by different patterns or workflows."},
{id:"aq2q3",type:"single",q:"A consultant writes a prompt that produces good output on the first try 40% of the time and needs revision 60% of the time. The course would characterise this as what kind of prompting situation?",
opts:["A failure — effective prompts should produce acceptable output on the first try at least 90% of the time or the prompt needs complete redesign",
"A sign that the underlying model is too weak for the task and needs to be upgraded to a frontier tier",
"A data problem — the consultant needs to provide more training examples before the prompt will work reliably",
"Normal — the course presents prompting as an iterative process where the first attempt is a starting point, not an expectation of perfection"],
correct:[3],cat:"analytical",
exp:"The course's TRACE method (Test, Revise, Add examples, Constrain, Evaluate) explicitly frames prompting as iterative. The course never sets a first-attempt success rate expectation — it describes prompting as a feedback loop where you test, identify what went wrong, and improve. A 40% first-try success rate is a normal starting point, not a failure, and the course's framework provides the iterative tools to improve it."},
{id:"aq2q4",type:"single",q:"The course says 'the 10-minute rule: if wrestling with a prompt for 10+ minutes without good results, step back.' Which action does the course NOT suggest as a next step after hitting this threshold?",
opts:["Upgrade immediately to the highest-tier frontier model available",
"Do the task yourself if AI is not the right tool",
"Break the task into smaller, more specific AI subtasks",
"Ask a colleague to help refine the approach"],
correct:[0],cat:"recall",
exp:"The course's 10-minute rule suggests: do it yourself, break it into smaller AI tasks, or ask a colleague. Immediately upgrading to a frontier model is not presented as the next step — the course's framework asks 'Is this a good AI task?' first, not 'Is this a good enough model?' Model upgrade is a cost decision made after confirming the task itself is appropriate for AI."},
{id:"aq2q5",type:"single",q:"An analyst uses AI to generate a strategic analysis, then submits it directly to the board without reading it. The course's framework identifies which specific failure in this workflow?",
opts:["The analyst used the wrong AI model — strategic analysis requires a frontier-tier model that the analyst likely did not use","The analyst violated the course's human-in-the-loop principle — you are accountable for all AI-generated outputs and must review before submitting to avoid errors reaching consequential audiences","The analyst's prompt was too vague — a more specific prompt would have produced output that did not need review before board submission","The analyst should have used chain-of-thought prompting to ensure the AI's reasoning was visible before submitting the analysis"],
correct:[1],cat:"scenario",
exp:"The course's accountability principle from Module 4 is unambiguous: 'You are accountable for the final output.' The course's 'sign your name test' asks: would you stake your reputation on this without edits? Submitting AI output to the board without reading it removes the human quality gate. Model selection, prompt specificity, and chain-of-thought are secondary — the fundamental failure is bypassing human review for a consequential high-visibility audience."},
],
3:[
{id:"aq3q1",type:"single",q:"The course identifies six high-risk hallucination zones. Which of the following appears on that list?",
opts:["General company descriptions for public companies with recent annual reports",
"Standard definitions of well-established technical terms in computer science",
"Recent statistics and data (where numbers may be outdated or fabricated)",
"Common knowledge questions about historical events before the training cutoff"],
correct:[2],cat:"recall",
exp:"The course's six high-risk hallucination zones from Module 3 include: recent statistics and data, citations and URLs, specific names and titles, recent events, medical/legal/financial specifics, and code with specific API details. Recent statistics is on the list precisely because the model generates plausible-sounding but potentially fabricated numbers. The other options describe categories where AI is generally reliable."},
{id:"aq3q2",type:"single",q:"The course recommends a specific technique to reduce hallucination when asking AI to summarise a regulatory document. Which technique is it and what does it specifically involve?",
opts:["Chain-of-thought prompting — asking the model to reason step by step before summarising reduces the probability of generating unsupported statements",
"Self-verification — asking the model to check its own summary against the facts it knows before presenting the final output",
"Temperature reduction — setting temperature to zero forces the model to always select the most probable tokens, which are more likely to be accurate",
"Grounding — providing the actual regulatory document text in the prompt so the model generates the summary from the specific provided text rather than from its training memory"],
correct:[3],cat:"recall",
exp:"The course defines grounding explicitly: 'Give the model the source material, ask it to work from that.' For regulatory summarisation, this means including the actual regulation text in the prompt and instructing the model to work from that specific text. This shifts the model from generating from training memory (hallucination risk) to generating from the provided document (much lower risk). Chain-of-thought, self-verification, and temperature reduction are not the course's primary recommendation for this specific task."},
{id:"aq3q3",type:"single",q:"A financial services firm asks AI to produce a regulatory compliance report without providing any source documents. The course's hallucination risk framework would categorise this as what level of risk?",
opts:["High risk — financial and regulatory specifics appear on the course's list of highest-risk hallucination zones, and without source documents, the model has no grounding, making fabricated regulatory details a significant risk",
"Low risk — regulatory compliance is a well-defined domain with stable rules that AI models are well-trained on",
"Medium risk — the model may get broad regulatory principles correct even if specific article numbers are occasionally wrong",
"No risk — regulatory questions have objective correct answers and the model will retrieve the accurate answer from its training data"],
correct:[0],cat:"analytical",
exp:"The course explicitly lists 'Medical/legal/financial specifics' as one of the six highest-risk hallucination zones in Module 3. Without grounding in provided source documents, the model must rely entirely on training memory for regulatory details — specific article numbers, thresholds, effective dates, and requirements. These are precisely the categories where AI generates plausible-sounding but potentially fabricated specifics. The course's verification pyramid places this at the high-stakes tier requiring verification of all specific claims."},
{id:"aq3q4",type:"single",q:"The course states that 'confidence does not equal accuracy' in AI outputs. A junior analyst interprets this to mean: 'I should distrust all AI outputs equally.' What does the course's actual framework suggest instead?",
opts:["The analyst's interpretation is correct — the course recommends treating all AI outputs with equal scepticism regardless of topic or model tier","The course recommends calibrating verification effort to the stakes of the output — not equal distrust of all outputs, but verification intensity proportional to consequences if the output is wrong","The course recommends using AI only for outputs where accuracy does not matter, avoiding it entirely for high-stakes work","The course recommends using AI confidence indicators as a proxy for accuracy — only verify outputs where the AI explicitly expresses uncertainty"],
correct:[1],cat:"analytical",
exp:"The course's verification pyramid is stakes-based, not equal-scepticism based. Low-stakes internal brainstorming needs light review; medium-stakes client-facing work needs spot-checks; high-stakes legal, medical, and financial outputs need verification of all specific claims. The principle 'confidence does not equal accuracy' means you cannot use AI's tone as a reliability signal — but it does not mean all outputs require the same verification effort. Stakes determine effort, not equal distrust."},
{id:"aq3q5",type:"single",q:"The course discusses prompt injection in the context of AI agents browsing the web. What specific type of action does the course cite as the primary concern when an agent is successfully injected?",
opts:["The agent produces biased or inaccurate text responses rather than neutral objective summaries",
"The agent's response time increases significantly as it processes the conflicting instructions in its context window",
"The agent takes real-world actions — forwarding emails, accessing data, modifying files — based on the injected instructions rather than the original user instructions",
"The agent enters an infinite loop attempting to reconcile the injected instructions with its system prompt constraints"],
correct:[2],cat:"recall",
exp:"The course's Module 3 on prompt injection states: 'Why this matters: Critical for agents browsing the web or reading emails. If successful, the agent may: Forward sensitive emails, access private data, make unauthorised purchases, delete files.' The primary concern is real-world action taken under injected instructions, not text quality, performance, or processing issues. This is why the course's defence requires human review before irreversible actions."},
],
4:[
{id:"aq4q1",type:"single",q:"The course identifies four domains as 'human required' — where AI can assist but human judgment must be the final decision-maker. Which of the following correctly lists these four domains?",
opts:["Content creation, data analysis, customer service, and marketing strategy",
"Engineering, design, sales, and operations",
"Strategic planning, competitive analysis, risk management, and compliance",
"Hiring and firing, medical and health, legal and contracts, and financial and investing"],
correct:[3],cat:"recall",
exp:"The course's Module 4 explicitly lists these four domains as requiring mandatory human oversight: hiring and firing decisions, medical and health decisions, legal and contract decisions, and financial and investing decisions. These are described as having real-world consequences for individuals and organisations that require human accountability, not just quality review."},
{id:"aq4q2",type:"single",q:"The course's data privacy guidance identifies specific categories of information that should 'never be shared' with AI tools in their standard configuration. Which category does the course explicitly name?",
opts:["Customer personal data including names, contact details, and account information",
"Internal meeting notes about product strategy discussions",
"General industry research and publicly available market analysis",
"Team performance objectives for the upcoming quarter"],
correct:[0],cat:"recall",
exp:"The course's Module 4 'never share' list explicitly includes: 'Personal data (names, emails, IDs, medical records), Client confidential information (contracts, financials, strategies), Proprietary source code, Financial records and projections, and anything under NDA.' Customer personal data — names, contact details, and account information — falls directly in this category and should never be pasted into standard AI tools without appropriate enterprise data protection agreements."},
{id:"aq4q3",type:"single",q:"The course describes 'automation complacency' as a risk in AI-assisted workflows. A customer service team initially reviews all AI-drafted responses before sending. Six months later, they review 10%. The course identifies this pattern as automation complacency. What is the primary risk?",
opts:["The AI model's quality will decline if it does not receive human feedback on its outputs, creating a self-reinforcing degradation loop","Reduced oversight means AI errors — hallucinations, inappropriate tone, incorrect information — pass undetected and reach customers, with the team no longer functioning as the quality gate","The team members will lose their customer service skills due to reduced practice on routine cases","The AI provider will detect the reduced review rate and automatically downgrade the account to a lower service tier"],
correct:[1],cat:"analytical",
exp:"The course addresses automation complacency in Module 4: 'Don't outsource your judgment; stay involved and keep your skills sharp.' The primary risk the course identifies is reduced quality oversight — when teams stop reviewing AI outputs, errors that would have been caught pass undetected to customers. The team that initially provided 100% review was the quality gate; dropping to 10% means 90% of AI errors now reach customers unchecked."},
{id:"aq4q4",type:"single",q:"The course recommends specific practices for 'responsible AI use' in the workplace. Which of the following is NOT on the course's list of responsible practices?",
opts:["Verify important facts and never rely solely on AI for critical decisions","Keep humans in the loop for consequential decisions","Use AI exclusively and avoid traditional methods to maximise the efficiency gains of adoption","Disclose AI use when appropriate and respect privacy"],
correct:[2],cat:"recall",
exp:"The course's responsible AI use principles from Module 4 include: verify important facts, keep humans in the loop, disclose AI use when appropriate, respect privacy, and maintain your skills. 'Use AI exclusively and avoid traditional methods' directly contradicts the course's principles — it violates the human-in-the-loop requirement, risks skill atrophy, and represents the AI-dependent (not AI-assisted) pattern the course explicitly warns against."},
{id:"aq4q5",type:"single",q:"According to the course, what is the 'three-question filter' used to determine whether a task is appropriate for AI assistance?",
opts:["Is the model capable? Is the cost acceptable? Is the output reviewable?",
"Is the task strategic? Is there a deadline? Will it affect customers?",
"Is the prompt specific? Is the model frontier-tier? Is the output under 500 words?",
"Is it routine or generative? Do you have the context AI needs? Will you verify the output?"],
correct:[3],cat:"recall",
exp:"The course's Module 4 three-question filter is explicitly: 'Is it routine or generative (high-volume, repetitive, or first-draft work)? Do you have the context (information AI needs in the prompt)? Will you verify (can you check accuracy before use)?' This filter determines AI task fit. Model capability, cost, strategy, and prompt length are not the three filter questions."},
],
5:[
{id:"aq5q1",type:"single",q:"The course explains that a 750-word document in English tokenises to approximately 1,000 tokens. A team submits a 3,000-word document. Approximately how many tokens does this represent, and what is the direct cost implication?",
opts:["Approximately 4,000 tokens — token count scales roughly proportionally with word count for English prose, and cost scales proportionally with token count",
"Approximately 1,000 tokens — the tokeniser compresses longer documents more efficiently than shorter ones",
"Approximately 10,000 tokens — longer documents require more computational context and therefore tokenise at a higher ratio",
"Approximately 500 tokens — the tokeniser uses semantic compression that reduces longer documents to their essential content"],
correct:[0],cat:"analytical",
exp:"The course's token rule of thumb: approximately 750 words equals 1,000 tokens for English prose. A 3,000-word document is 4 times 750 words, producing approximately 4,000 tokens. Since API pricing is per-token, cost scales proportionally — 4,000 tokens costs approximately 4 times as much as 1,000 tokens at the same model and pricing tier. Tokenisers do not compress semantically or apply higher ratios for longer documents."},
{id:"aq5q2",type:"single",q:"The course describes prompt caching as saving '50-90%' on input token costs for applications with repeated system prompts. What specific technical mechanism enables this saving?",
opts:["The AI provider stores the model's final output and replays it for identical subsequent requests, bypassing the model entirely","The pre-computed key-value representations of the repeated prompt prefix are stored — subsequent requests referencing that same prefix do not re-process those tokens, charging only for the new content beyond the cached prefix","The prompt is compressed using standard data compression algorithms and decompressed at inference time, reducing transmission costs","The AI provider pre-generates responses to common system prompts during off-peak hours and stores them for instant retrieval during peak usage"],
correct:[1],cat:"recall",
exp:"The course defines prompt caching as storing the pre-computed key-value representations of repeated prompt prefixes. When a subsequent request references the same prefix, the provider skips re-processing those tokens — only processing the new content beyond the cached portion. This is why the saving (50-90%) applies specifically to the cached portion's input token cost, not to output tokens or the dynamic portion of each request."},
{id:"aq5q3",type:"single",q:"The course's model tiering framework uses three tiers: fast-cheap (Haiku), balanced (Sonnet), and frontier (Opus). The course explicitly lists 'complex reasoning' as the primary criterion for frontier-tier selection. Which of the following tasks is most clearly in the 'fast-cheap' category?",
opts:["Synthesising conflicting viewpoints from ten research papers into a strategic recommendation","Writing a 5,000-word technical white paper on AI trends for publication","Classifying customer support tickets into five predefined categories","Evaluating three acquisition candidates across fifteen criteria and recommending one"],
correct:[2],cat:"recall",
exp:"The course's task-model matching table lists 'Classification, labeling' as 'Fast-Cheap' tier with the note: 'Binary or categorical decisions don't need frontier reasoning.' Classifying into predefined categories is the paradigmatic fast-cheap task — it is high-volume, rule-following, and does not require multi-step reasoning. The other options involve synthesis, long-form generation, and complex multi-criteria evaluation — all characteristics of balanced or frontier tasks."},
{id:"aq5q4",type:"single",q:"The course states: 'Set output limits in your prompt.' A team adds 'respond in under 100 words' to a prompt that previously produced 500-word responses. The model now consistently produces 80-100 word responses. What is the direct financial impact of this change for a team making 10,000 API calls monthly?",
opts:["No impact — output limits change response length but AI providers charge a flat rate per API call regardless of response length",
"The team reduces input token costs by 80% — shorter output instructions require shorter input prompts",
"The team increases costs slightly — shorter responses require more follow-up queries, increasing total API call volume",
"The team reduces output token costs by approximately 80% for this prompt type — at 10,000 monthly calls, 400 fewer output tokens per call represents 4 million fewer output tokens charged monthly"],
correct:[3],cat:"analytical",
exp:"The course states output tokens are charged per-token. Reducing from 500 words (approximately 670 tokens) to 90 words (approximately 120 tokens) is approximately 80% fewer output tokens per call. At 10,000 monthly calls, this is (670-120) times 10,000 = 5,500,000 fewer output tokens monthly. Since output tokens are priced higher than input tokens, this is a significant cost reduction. The change affects output tokens, not input tokens, and reduces follow-up queries by producing more focused responses."},
{id:"aq5q5",type:"single",q:"The course's cost example shows: 'No optimisation: $450/month. With all tactics applied: $35/month.' What combination of tactics does the course identify as responsible for the bulk of this 87% cost reduction?",
opts:["Model selection (switching from frontier to fast-cheap where appropriate) and prompt caching (for repeated system prompts) — these two tactics each offer 50-90% savings and together drive the largest portion of the total reduction",
"Prompt optimisation alone — removing redundant instructions from system prompts accounts for the majority of savings in most enterprise AI deployments",
"Output length limits alone — reducing response verbosity consistently delivers the highest cost savings across all task types",
"Monitoring and analytics alone — identifying which features consume the most tokens and eliminating unnecessary AI features accounts for the reduction"],
correct:[0],cat:"analytical",
exp:"The course's savings-by-tactic table: model selection 50-90% savings, prompt caching 50-90% savings, prompt optimisation 30-50%, output limits 20-40%. Model selection and prompt caching tie for the highest potential impact and together enable the largest cost reductions. For an application like the course's example (previously using frontier models for all tasks with long uncached system prompts), switching to tiered models plus caching the system prompt accounts for the majority of the 87% reduction."},
],
6:[
{id:"aq6q1",type:"single",q:"The course presents a model comparison table. Which characteristic does the course identify as Claude's specific competitive strength over other providers?",
opts:["The highest benchmark scores on MMLU and HumanEval, making it the most capable model for any task type","Long context window (200K tokens), strong instruction following, and safety-focused design — best for long document analysis and enterprise deployments requiring predictable behaviour","The lowest per-token pricing across all tiers, making it the most cost-efficient choice for any high-volume application","Native multimodal capabilities for video and audio processing, best for media and entertainment enterprise workflows"],
correct:[1],cat:"recall",
exp:"The course's model comparison table identifies Claude's specific strengths as: '200K context window, strong instruction following, Constitutional AI, thoughtful by design, fewer surprises. Best for: Long documents, complex instructions, safety-critical applications.' This distinguishes Claude from OpenAI (broader integrations, function calling) and Gemini (native multimodal, Workspace integration). The course explicitly does not claim Claude is cheapest, highest benchmark, or best for video."},
{id:"aq6q2",type:"single",q:"A data science team builds an AI feature that analyses customer churn and produces strategic recommendations for account managers. The course's decision tree places this task at which model tier?",
opts:["Fast-cheap (Haiku) — churn analysis is a classification task and classification belongs in the fast-cheap tier",
"Frontier (Opus) — any task producing recommendations for account managers qualifies as complex reasoning requiring the highest tier",
"Balanced (Sonnet) — data analysis and strategic recommendations are explicitly in the balanced tier's task table",
"Either fast-cheap or frontier depending on the number of customer accounts being analysed simultaneously"],
correct:[2],cat:"analytical",
exp:"The course's task-model matching table lists 'Data analysis and insights, Research summaries, Content generation' as 'Balanced (Sonnet)' tier tasks. Churn analysis producing strategic recommendations involves synthesis, pattern identification, and recommendation generation — not simple binary classification. It falls in the balanced tier. Frontier is reserved for complex multi-step reasoning where balanced is visibly insufficient. Account volume does not determine model tier."},
{id:"aq6q3",type:"single",q:"The course's '80/20 rule' states that most teams use balanced models for 80% of tasks. A CTO asks: 'Can we standardise on just one model for everything?' What does the course's framework suggest?",
opts:["Yes — standardising on the balanced tier is the correct single-model strategy; it handles 80% of tasks well and the remaining 20% will be acceptable",
"Yes — standardising on the frontier tier ensures maximum quality across all tasks, and the cost premium is justified by the elimination of model selection complexity",
"Yes — standardising on the fast-cheap tier is the optimal single-model strategy; the quality is adequate for most professional tasks and the cost savings are substantial",
"No — the course's framework recommends a tiered approach: fast-cheap for high-volume simple tasks, balanced for most work, and frontier only when the balanced tier is verifiably insufficient"],
correct:[3],cat:"analytical",
exp:"The course's tiering framework is explicitly designed for task-appropriate model selection, not standardisation. 'Use Haiku for simple tasks, Sonnet for balance, Opus for complex reasoning.' While balanced handles 80% of tasks well, the course identifies that high-volume simple tasks (classification, extraction) are significantly overpaying at balanced tier, and some complex tasks genuinely need frontier. The course recommends a tiered strategy, not single-model standardisation."},
{id:"aq6q4",type:"single",q:"The course describes reasoning models (o3, Claude with extended thinking) as a 'premium option for hard problems.' Which of the following tasks is in the course's explicit 'overkill' list for reasoning models?",
opts:["Writing and summarisation tasks where the output structure is well-defined",
"Multi-step mathematical proof verification requiring checking all intermediate steps",
"Ambiguous strategic planning where multiple paths could be valid and trade-offs need to be explored",
"Complex code debugging across a 50,000-line codebase to identify a subtle logic error"],
correct:[0],cat:"recall",
exp:"The course's reasoning model 'overkill' list explicitly includes: 'Writing and summarisation, Simple Q&A, Classification, Boilerplate code, Basic brainstorming.' Writing and summarisation tasks — even long or complex ones — are in this category because the multi-path reasoning exploration that reasoning models provide does not meaningfully improve generation quality for these task types. Math proofs, ambiguous strategy, and complex debugging are on the 'wins' list."},
{id:"aq6q5",type:"single",q:"According to the course, which of the following is the correct first step when starting a new AI use case and selecting a model?",
opts:["Start with the frontier model to establish the maximum quality baseline, then downgrade until quality degrades below acceptable levels","Start with the fast-cheap model; it is 10x cheaper and often good enough, and upgrade only when the output is visibly insufficient for the specific task","Start with a benchmark comparison of all available models to identify the highest-scoring option for your specific domain","Start with whichever model your current AI provider subscription includes, and only consider alternatives if it fails completely"],
correct:[1],cat:"recall",
exp:"The course states explicitly: 'Start cheap. Begin with a fast-cheap model. It's 10x cheaper and often good enough. Upgrade only when insufficient.' This is the correct first step in the course's model selection framework. Starting with frontier and downgrading (option A) wastes cost and sets an unnecessarily high quality expectation. Benchmark comparison (option C) is a secondary validation step. Defaulting to subscription defaults (option D) ignores task-appropriate selection."},
],
7:[
{id:"aq7q1",type:"single",q:"The course describes a 'ticket filer' and a 'meeting prep assistant' as real examples of deployed AI agents. What property is common to both that classifies them as agents rather than simple chatbots?",
opts:["Both interact with users through a conversational natural language interface rather than a structured form or GUI",
"Both are deployed on cloud infrastructure rather than running locally on enterprise servers",
"Both take multi-step actions using tools to complete a goal — reading external inputs, processing them, and writing outputs to external systems — rather than just generating text in response to a single query",
"Both use frontier-tier models rather than balanced or fast-cheap models to achieve the reliability required for autonomous operation"],
correct:[2],cat:"analytical",
exp:"The course's definition of agents versus chatbots centres on the Observe-Think-Act-Observe loop with tool use. The ticket filer reads an email (tool: read files), categorises it (reasoning), and opens a ticket (tool: call APIs). The meeting prep assistant reads calendar invites (tool: read files), searches relevant background (tool: search web), and prepares briefs (tool: create files). Both take multi-step actions using external tools toward a goal — the defining agent property."},
{id:"aq7q2",type:"single",q:"The course warns that prompt injection is 'critical for agents browsing the web or reading emails.' A developer argues: 'Our agent only reads internal documents, not external websites, so injection is not a risk.' What does the course's framework say about this argument?",
opts:["The argument is correct — prompt injection only occurs through external web content; internal documents cannot contain injected instructions",
"The argument is correct — internal documents have been created by trusted employees and cannot contain malicious instructions",
"The argument is irrelevant — prompt injection is purely a technical vulnerability that only affects open-source model deployments, not commercial API-based agents",
"The argument is incomplete — internal documents can also contain maliciously crafted instructions, and any agent that processes document content as input remains vulnerable to injection through that content"],
correct:[3],cat:"analytical",
exp:"The course's prompt injection framework applies to any external content processed by an agent — not just web pages. Internal documents can contain instructions placed by a disgruntled employee, a compromised account, or even inadvertently through copy-pasted external content. The key vulnerability is that the agent processes content as both data and potential instructions without distinguishing between them. 'Internal only' reduces but does not eliminate injection risk."},
{id:"aq7q3",type:"single",q:"The course describes RAG as enabling AI to 'work with your company data without retraining.' Which scenario does the course identify as the clearest case where RAG is the right choice over fine-tuning?",
opts:["When you have private knowledge (internal policies, product documentation) that changes frequently and needs to be reflected in AI responses immediately",
"When you need the model to adopt a specific writing style and tone that differs significantly from its default communication pattern",
"When you need the model to perform a completely new type of task it has never seen examples of in its training data",
"When the model consistently makes errors on your specific domain due to insufficient domain representation in its training data"],
correct:[0],cat:"recall",
exp:"The course's RAG vs. fine-tuning decision guide states: 'Use RAG if knowledge changes — your docs are updated frequently. RAG picks up new info immediately without retraining.' Frequently updated private knowledge is the clearest RAG use case because: RAG queries the current document store at query time (no training cycle needed for updates), while fine-tuning produces a static model that requires a new training run for each knowledge update. Writing style, new task types, and domain errors are fine-tuning use cases."},
{id:"aq7q4",type:"single",q:"The course describes 'Level 2 — Moderate effort (1-2 hours/week)' for AI learning. What activities does the course include at this level that are NOT included at Level 1?",
opts:["Following 3-4 reliable newsletters and skimming headlines weekly — this is the Level 2 addition to Level 1's basic awareness","Experimenting with tools for your own role, joining AI communities, reading case studies, attending webinars — moving from awareness to active learning and application","Building and deploying AI tools in production workflows and contributing to open-source AI projects","Attending in-person AI conferences and earning recognised professional certifications in machine learning"],
correct:[1],cat:"recall",
exp:"The course's learning level framework: Level 1 (15 min/week) includes following 3-4 newsletters, skimming headlines, trying new tools monthly. Level 2 (1-2 hours/week) adds: experimenting with tools for your specific role, joining AI communities, reading case studies, attending webinars, building simple automations. Level 2 is 'active learning and application,' not just passive awareness. Conferences, certifications, and open-source contribution are Level 3 activities."},
{id:"aq7q5",type:"single",q:"The course's multi-step pipeline example shows: Classify (Haiku) then Draft (Sonnet) then Human Review then Send. The course identifies 'validate at each step' as a key advantage. What does validation at the classification step specifically prevent?",
opts:["It prevents the Sonnet model from generating responses that exceed the specified output length limit",
"It ensures the human review step focuses only on the highest-risk tickets rather than reviewing all AI-drafted responses",
"It catches misclassification errors before they propagate into the drafting step — a ticket misclassified as a billing query would cause Sonnet to draft the wrong type of response, compounding the error downstream",

// ── STATE ──────────────────────────────────────────────────────────────────
let appView='landing';
let quizState=null;
let timerInterval=null;

function fmtTime(sec){const m=Math.floor(sec/60),s=sec%60;return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function el(tag,cls){const e=document.createElement(tag);if(cls)cls.trim().split(/\s+/).filter(Boolean).forEach(c=>e.classList.add(c));return e;}
function arrEq(a,b){if(a.length!==b.length)return false;const sa=a.slice().sort(),sb=b.slice().sort();for(let i=0;i<sa.length;i++)if(sa[i]!==sb[i])return false;return true;}

function getRemainingTime(){return Math.max(0,quizState.timeLimit-Math.floor((Date.now()-quizState.timerStart)/1000));}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{const tv=document.querySelector('.timer-val');if(tv)tv.textContent=fmtTime(getRemainingTime());},1000);
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function randomiseOpts(q){
  // Build index mapping: originalIndex -> newIndex after shuffle
  const n=q.opts.length;
  const order=shuffle([...Array(n).keys()]); // order[newPos]=oldPos
  const newOpts=order.map(old=>q.opts[old]);
  // Remap correct array: correct had old indices, map to new positions
  const oldToNew=[];
  order.forEach((old,newPos)=>oldToNew[old]=newPos);
  const newCorrect=q.correct.map(old=>oldToNew[old]);
  return{...q,opts:newOpts,correct:newCorrect};
}

function startQuiz(moduleId){
  let questions=[],isAll=moduleId==='all';
  if(isAll){
    // For all-modules: pick all 5 per module from AQ, shuffle within each module group, randomise opts
    for(let m=1;m<=8;m++){
      const pool=AQ[m]||[];
      shuffle(pool).forEach(q=>questions.push(randomiseOpts({...q,_mod:m})));
    }
  } else {
    // For module quiz: merge MQ (10) + MQ_EXT (10) = 20 pool, pick 10 random, shuffle order, randomise opts
    const pool=[...(MQ[moduleId]||[])];
    const picked=shuffle(pool).slice(0,10);
    questions=picked.map(q=>randomiseOpts({...q,_mod:moduleId}));
  }
  quizState={moduleId,isAll,questions,current:0,answers:{},submitted:{},filter:'all',timeLimit:isAll?40*60:20*60,timerStart:Date.now()};
  appView='quiz';render();startTimer();
}

function getIndices(){
  const{questions,filter,isAll}=quizState;
  if(isAll||filter==='all')return questions.map((_,i)=>i);
  return questions.map((_,i)=>i).filter(i=>questions[i].cat===filter);
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  if(appView==='landing')root.appendChild(renderLanding());
  else if(appView==='quiz')root.appendChild(renderQuiz());
  else root.appendChild(renderResults());
}

// ── LANDING ──────────────────────────────────────────────────────────────────
function renderLanding(){
  const wrap=el('div','landing fade-in');
  const nav=el('nav','land-nav');
  const logo=el('div','land-logo');
  const li=el('div','logo-icon');li.textContent='🧠';
  const lt=el('div','logo-text');
  const lh=el('h1');lh.textContent='AI Foundation';
  const ls=el('span');ls.textContent='Practice Portal';
  lt.append(lh,ls);logo.append(li,lt);
  const nr=el('div','');nr.style.cssText='font-size:12px;color:var(--text3);';nr.textContent='No login required · Self-paced practice';
  nav.append(logo,nr);

  const hero=el('div','land-hero');
  hero.appendChild(el('div','land-hero-bg'));
  const ey=el('div','hero-eyebrow');
  const dot=el('span','hero-dot');ey.append(dot,'8 Modules · 120 Questions');
  const h2=el('h2');h2.innerHTML='Master AI Fundamentals<br><em>One Question at a Time</em>';
  const hp=el('p');hp.textContent='Practise module-by-module or test across all 8 modules. Instant feedback with explanations on every question.';
  hero.append(ey,h2,hp);

  const body=el('div','land-body');
  const ml=el('div','section-label');ml.textContent='Module Practice Sets — 10 Questions Each';
  const grid=el('div','modules-grid');
  MODULE_META.forEach(mod=>{
    const card=el('div','mod-card');
    card.style.setProperty('--mod-color',mod.color);
    const icon=el('div','mod-icon');icon.textContent=mod.icon;
    const num=el('div','mod-num');num.textContent=`Module ${mod.id}`;
    const title=el('div','mod-title');title.textContent=mod.title;
    const meta=el('div','mod-meta');meta.textContent='10 of 20 questions · Randomised each attempt';
    card.append(icon,num,title,meta);
    card.addEventListener('click',()=>startQuiz(mod.id));
    grid.appendChild(card);
  });

  const al=el('div','section-label');al.style.marginTop='8px';al.textContent='Full Assessment';
  const ac=el('div','all-card');
  const ai=el('div','all-card-icon');ai.textContent='🎯';
  const at=el('div','all-card-text');
  const ah=el('h3');ah.textContent='All Modules Practice Test';
  const ap=el('p');ap.textContent='5 questions per module × 8 modules · Randomised order & options each attempt';
  at.append(ah,ap);
  const ab=el('div','all-card-badge');ab.textContent='40 Questions · 40 min';
  ac.append(ai,at,ab);
  ac.addEventListener('click',()=>startQuiz('all'));

  body.append(ml,grid,al,ac);
  wrap.append(nav,hero,body);
  return wrap;
}

// ── QUIZ ──────────────────────────────────────────────────────────────────────
function renderQuiz(){
  const{questions,current,isAll,moduleId,filter}=quizState;
  const modMeta=MODULE_META.find(m=>m.id===moduleId)||{};
  const indices=getIndices();
  const totalShown=indices.length;
  const pos=Math.min(current,totalShown-1);
  const globalIdx=indices[pos];
  const q=questions[globalIdx];

  const wrap=el('div','quiz-page fade-in');

  // topbar
  const tb=el('div','quiz-topbar');
  const tbl=el('div','quiz-topbar-left');
  const bb=el('button','back-btn');bb.innerHTML='← Back';
  bb.addEventListener('click',()=>{if(confirm('Leave quiz? Progress will be lost.')){clearInterval(timerInterval);appView='landing';render();}});
  const tbd=el('div','quiz-title-block');
  const tbh=el('h2');tbh.textContent=isAll?'All Modules Practice Test':`Module ${moduleId}: ${modMeta.title||''}`;
  const tbs=el('p');tbs.textContent=`Question ${pos+1} of ${totalShown}`;
  tbd.append(tbh,tbs);tbl.append(bb,tbd);
  const tmr=el('div','timer-block');
  const tv=el('div','timer-val');tv.textContent=fmtTime(getRemainingTime());
  const tl=el('div','timer-lbl');tl.textContent='remaining';
  tmr.append(tv,tl);tb.append(tbl,tmr);

  // progress
  const pb=el('div','prog-bar');
  const pf=el('div','prog-fill');pf.style.width=`${((pos+1)/totalShown)*100}%`;
  pb.appendChild(pf);

  const body=el('div','quiz-body');

  // filter bar (module only)
  if(!isAll){
    const fb=el('div','filter-bar');
    const fl=el('span','filter-lbl');fl.textContent='Filter:';fb.appendChild(fl);
    ['all','recall','scenario','analytical'].forEach(cat=>{
      const btn=el('button','filter-btn'+(filter===cat?' active':''));
      btn.textContent=cat==='all'?'All':cat.charAt(0).toUpperCase()+cat.slice(1);
      btn.addEventListener('click',()=>{quizState.filter=cat;quizState.current=0;render();});
      fb.appendChild(btn);
    });
    body.appendChild(fb);
  }

  if(!q||totalShown===0){
    const emp=el('div','empty-filter');emp.textContent='No questions match this filter. Try "All".';
    body.appendChild(emp);wrap.append(tb,pb,body);return wrap;
  }

  // module group header for all-modules
  if(isAll){
    const prevGIdx=pos>0?indices[pos-1]:null;
    const prevMod=prevGIdx!==null?questions[prevGIdx]._mod:null;
    if(prevMod!==q._mod){
      const mi=MODULE_META.find(m=>m.id===q._mod)||{};
      const gh=el('div','mod-group-header');
      gh.style.borderColor=mi.color||'var(--accent)';
      gh.style.color=mi.color||'var(--accent)';
      gh.innerHTML=`${mi.icon||''} Module ${q._mod}: ${mi.title||''}`;
      body.appendChild(gh);
    }
  }

  const isMulti=q.type==='multiple';
  const selected=quizState.answers[globalIdx]||[];
  const submitted=quizState.submitted[globalIdx]||false;

  // q card
  const qc=el('div','q-card');
  const qm=el('div','q-meta');
  const qn=el('div','q-num');qn.textContent=`Question ${pos+1} of ${totalShown}`;
  const qb=el('span','q-cat-badge cat-'+(q.cat||'recall'));qb.textContent=q.cat||'';
  qm.append(qn,qb);
  const qt=el('div','q-text');qt.textContent=q.q;
  qc.append(qm,qt);
  if(isMulti){const mn=el('div','multi-note');mn.textContent='Select all that apply, then submit.';qc.appendChild(mn);}

  const opts=el('div','opts');
  q.opts.forEach((optText,i)=>{
    const oe=el('div','opt');
    if(submitted)oe.classList.add('disabled');
    if(submitted){
      if(q.correct.includes(i))oe.classList.add('cor');
      else if(selected.includes(i))oe.classList.add('wrg');
    }else{
      if(selected.includes(i))oe.classList.add('sel');
    }
    const mk=el('div','omark');
    if(submitted){
      if(q.correct.includes(i)){mk.classList.add('cor-icon');mk.textContent='✓';}
      else if(selected.includes(i)){mk.classList.add('wrg-icon');mk.textContent='✗';}
      else mk.classList.add(isMulti?'sq':'rd');
    }else{
      if(selected.includes(i)){mk.classList.add(isMulti?'checked-sq':'checked-rd');mk.textContent='✓';}
      else mk.classList.add(isMulti?'sq':'rd');
    }
    const ot=el('div','otext');ot.textContent=optText;
    oe.append(mk,ot);
    if(!submitted){
      oe.addEventListener('click',()=>{
        let ns=[...(quizState.answers[globalIdx]||[])];
        if(isMulti){if(ns.includes(i))ns=ns.filter(x=>x!==i);else ns.push(i);}
        else ns=[i];
        quizState.answers[globalIdx]=ns;
        render();
      });
    }
    opts.appendChild(oe);
  });
  qc.appendChild(opts);

  // feedback
  if(submitted){
    const isCorrect=arrEq(selected,q.correct);
    const fb=el('div','feedback-box '+(isCorrect?'fb-correct':'fb-incorrect'));
    const fbh=el('div','fb-header');fbh.textContent=isCorrect?'✓ Correct!':'✗ Incorrect';
    const fbe=el('div','fb-exp');fbe.textContent=q.exp||'';
    fb.append(fbh,fbe);
    if(!isCorrect){
      const ca=el('div','fb-correct-ans');
      ca.textContent='Correct answer: '+q.correct.map(i=>q.opts[i]).join('; ');
      fb.appendChild(ca);
    }
    qc.appendChild(fb);
  }
  body.appendChild(qc);

  // action row
  const ar=el('div','action-row');
  const answered=Object.values(quizState.submitted).filter(Boolean).length;
  const qp=el('div','q-progress');qp.textContent=`${answered} answered`;
  ar.appendChild(qp);

  if(!submitted){
    const sb=el('button','btn-submit');sb.textContent='Submit Answer';
    sb.disabled=selected.length===0;
    sb.addEventListener('click',()=>{quizState.submitted[globalIdx]=true;render();});
    ar.appendChild(sb);
  }else{
    const isLast=pos>=totalShown-1;
    const nb=el('button','btn-next');
    if(isLast){nb.textContent='View Results →';nb.style.background='#16a34a';nb.addEventListener('click',()=>{clearInterval(timerInterval);appView='results';render();});}
    else{nb.textContent='Next Question →';nb.addEventListener('click',()=>{quizState.current=pos+1;render();});}
    ar.appendChild(nb);
  }
  body.appendChild(ar);
  wrap.append(tb,pb,body);
  return wrap;
}

// ── RESULTS ──────────────────────────────────────────────────────────────────
function renderResults(){
  const{questions,answers,submitted,moduleId,isAll}=quizState;
  const indices=getIndices();
  const modMeta=MODULE_META.find(m=>m.id===moduleId)||{};
  let correct=0,total=0;
  indices.forEach(i=>{if(submitted[i]){total++;if(arrEq(answers[i]||[],questions[i].correct))correct++;}});
  const pct=total>0?Math.round((correct/total)*100):0;
  const color=pct>=70?'#16a34a':pct>=50?'#f59e0b':'#dc2626';

  const wrap=el('div','results-page fade-in');
  const tb=el('div','results-topbar');
  const bb=el('button','back-btn');bb.innerHTML='← Back to Modules';bb.addEventListener('click',()=>{appView='landing';render();});
  const tbd=el('div','quiz-title-block');
  const tbh=el('h2');tbh.textContent=isAll?'All Modules Practice Test':`Module ${moduleId}: ${modMeta.title||''}`;
  const tbs=el('p');tbs.textContent='Results';tbd.append(tbh,tbs);
  tb.append(bb,tbd);

  const body=el('div','results-body');

  // Score hero
  const sh=el('div','score-hero');
  const size=140,r=55,cx=70,cy=70,circ=2*Math.PI*r,dash=circ*(pct/100);
  const rw=el('div','score-ring-wrap');
  rw.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="score-ring-svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e2e6f0" stroke-width="12"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="12"
      stroke-dasharray="${dash} ${circ-dash}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"/>
  </svg>`;
  const si=el('div','score-inner');
  si.innerHTML=`<div class="score-pct" style="color:${color}">${pct}%</div><div class="score-sub-lbl">Your Score</div>`;
  rw.appendChild(si);
  const st=el('div','score-text');st.textContent=`${correct} / ${total} Correct`;
  const ss=el('div','score-sub');ss.textContent=total<indices.length?`(${indices.length-total} question${indices.length-total!==1?'s':''} not attempted)`:'All questions attempted';
  const ra=el('div','results-actions');
  const rb=el('button','btn-retake');rb.textContent='↺ Retake';rb.addEventListener('click',()=>startQuiz(moduleId));
  const rhb=el('button','btn-back-home');rhb.textContent='← Back to Modules';rhb.addEventListener('click',()=>{appView='landing';render();});
  ra.append(rb,rhb);sh.append(rw,st,ss,ra);

  // Review
  const rs=el('div','review-section');
  const rh=el('h3');rh.textContent='Full Review';rs.appendChild(rh);
  let lastMod=null;
  indices.forEach((gi,pos)=>{
    const q=questions[gi];
    const sel=answers[gi]||[];
    const sub=submitted[gi]||false;
    const isCorrect=sub&&arrEq(sel,q.correct);
    if(isAll&&q._mod!==lastMod){
      lastMod=q._mod;
      const mi=MODULE_META.find(m=>m.id===q._mod)||{};
      const gh=el('div','review-group-hdr');
      gh.style.borderColor=mi.color||'var(--accent)';
      gh.style.color=mi.color||'var(--accent)';
      gh.innerHTML=`${mi.icon||''} Module ${q._mod}: ${mi.title||''}`;
      rs.appendChild(gh);
    }
    const rq=el('div','review-q');
    const rqh=el('div','rq-header');
    const st2=el('div','rq-status '+(sub?(isCorrect?'rq-cor':'rq-wrg'):'rq-skip'));
    st2.textContent=sub?(isCorrect?'✓':'✗'):'—';
    const rqt=el('div','rq-text');rqt.textContent=`${pos+1}. ${q.q}`;
    rqh.append(st2,rqt);rq.appendChild(rqh);
    if(!sub){const sk=el('div','');sk.style.cssText='font-size:12px;color:#9ca3af;font-style:italic;padding:2px 0 10px;';sk.textContent='Not attempted';rq.appendChild(sk);}
    else{
      const ro=el('div','rq-opts');
      q.opts.forEach((ot,i)=>{
        const isCor=q.correct.includes(i),isSel=sel.includes(i);
        let cls='ro-neu';if(isCor)cls='ro-cor';else if(isSel)cls='ro-wrg';
        const rod=el('div','ro '+cls);
        const ri=el('span','ro-icon');ri.textContent=isCor?'✓':(isSel?'✗':'·');
        const rt=el('span');rt.textContent=ot;rod.append(ri,rt);ro.appendChild(rod);
      });
      rq.appendChild(ro);
    }
    const re=el('div','rq-exp');re.innerHTML=`<strong>Explanation:</strong> ${q.exp||''}`;
    rq.appendChild(re);rs.appendChild(rq);
  });
  body.append(sh,rs);wrap.append(tb,body);
  return wrap;
}

render();

</script>
