opts:["AI-generated reports should always be labelled as AI-generated to protect the producing organisation from reputational damage","The financial and reputational costs of AI hallucinations in high-stakes professional deliverables can be severe — enterprise deployment of AI without verification processes creates risk disproportionate to the efficiency gains","The AI tools used by major consulting firms are insufficiently capable for professional use and should be replaced with domain-specific models","Clients should be required to sign liability waivers acknowledging they understand AI tools were used in production of any deliverable"],
correct:[1],cat:"analytical",
exp:"The course uses the Deloitte incident to illustrate that hallucinations in high-stakes professional contexts have real financial and reputational consequences — the report cites approximately $440,000 cost and significant credibility impact. The lesson is about the scale of risk from deploying AI in professional contexts without adequate verification processes."},

{id:"m3q19",type:"single",q:"A team uses AI to analyse 200 customer support tickets and identify the top 5 complaint themes. They act on the AI's ranking without reviewing individual tickets. What hallucination-related risk does the course identify?",
opts:["AI cannot perform thematic analysis on unstructured text and will always produce incorrect theme rankings",
"AI analysis of customer feedback is reliable enough to act on directly because the volume of data statistically suppresses individual classification errors",
"The AI may misclassify tickets, invent theme labels, or over-weight certain patterns, producing a ranking that does not accurately reflect the actual distribution — high-stakes action requires spot-checking against source data",
"The risk is minimal because each ticket is short text, and AI hallucination risk is proportional to output length rather than input classification accuracy"],
correct:[2],cat:"scenario",
exp:"AI classification of text inputs is imperfect — misclassification, invented categories, and pattern over-weighting are all possible. When the output drives resource allocation decisions, acting on it without spot-checking introduces risk that the ranking does not reflect ground truth. The course's stakes-based verification principle applies: medium-to-high stakes decisions based on AI analysis require sampling and verification against source data."},

{id:"m3q20",type:"single",q:"The course states that for AI agents with tool access, prompt injection is a critical security concern. What defensive principle does the course specifically recommend as essential for preventing harmful outcomes?",
opts:["Block all external content from agent inputs — agents should only process content from trusted internal sources to eliminate injection risk",
"Use only closed-source commercial models for agents because they have superior built-in injection defence compared to open-source alternatives",
"Require agents to request human approval for every single action, making them effectively supervised assistants rather than autonomous agents",
"Always review agent actions before they execute, especially irreversible ones — sandboxing, output filtering, and audit logs are additional layers of defence"],
correct:[3],cat:"recall",
exp:"The course's defence strategy includes: human review before action (always review before sending emails, deleting files, transferring money), sandboxing (restrict what agents can access and modify), output filtering (screen for suspicious patterns), clear instructions (explicit boundaries), and audit logs. 'Human review before irreversible action' is the primary defence principle."},
],
4:[
{id:"m4q1",type:"single",q:"The course's three-question filter asks: Is it routine or generative? Do you have context? Will you verify? A manager wants to use AI to draft a condolence message to a key client who has suffered a bereavement. Which question most directly disqualifies this task?",
opts:["Question 2 — the manager likely lacks the specific relationship context needed for a genuine condolence message that will not feel impersonal",
"Question 1 — the task is neither routine nor generative; emotional communication is categorically outside AI capability",
"Question 3 — the manager will not be able to verify whether the message achieves its intended emotional effect before sending",
"All three questions disqualify it simultaneously — emotionally sensitive communication fails every filter criterion"],
correct:[0],cat:"analytical",
exp:"Question 2 is the primary disqualifier. A condolence message requires relationship context — how well they know each other, what personal details should be referenced, what tone their prior correspondence established. Without this, AI produces a generic template that may feel impersonal and damage the relationship. The course lists 'nuanced emotional messaging' and 'relationship-heavy work' explicitly as tasks where AI slows you down."},

{id:"m4q2",type:"single",q:"A business unit head approves subscriptions to three AI tools for their team without involving IT or legal. Six months later, sensitive client data has been processed through one tool's free tier. What governance risk does this illustrate?",
opts:["The business unit head violated AI provider terms of service by using free-tier tools for commercial purposes","Shadow AI — tools adopted without security review, data governance approval, or procurement oversight — create unmanaged data exposure because free-tier tools may store, log, or train on submitted content","The IT department failed to implement technical controls that would have automatically blocked unauthorised AI tool usage","The employees used the tools incorrectly, submitting data they should have known was inappropriate for any cloud service"],
correct:[1],cat:"scenario",
exp:"The course's Module 4 on data privacy specifically warns about shadow AI: adoption that bypasses processes designed to protect data. Free-tier consumer AI tools frequently have data handling terms that allow storage and training on submitted content. Without procurement and legal review, teams may unknowingly expose client data to these terms. The fix is governance — requiring security and legal review before AI tools handle sensitive data."},

{id:"m4q3",type:"single",q:"A professional wants to use AI to help draft a client proposal using confidential client financial projections. According to the course's data privacy guidance, what should they do first?",
opts:["Proceed — client proposals are a standard business use case explicitly covered as acceptable by all major AI providers",
"Remove the client's company name from the data before submitting — this anonymisation is sufficient to protect confidentiality",
"Check the AI tool's data policy and their organisation's AI use policy before submitting any client financial data — the tool may store or train on submitted content",
"Use the client's data only in the system prompt, not the user prompt, as system prompt content is not logged by AI providers"],
correct:[2],cat:"recall",
exp:"The course states: 'Assume it may be stored. Even with privacy policies, assume that data you paste into public AI tools could be retained, reviewed, or used for model training. Default to caution.' The course also identifies 'client contracts' and 'financial records' in the 'never share' category. The required first step is checking the tool's data policy and the organisation's AI use policy."},

{id:"m4q4",type:"single",q:"The course introduces the 'sign your name test.' A junior analyst submits an AI-generated market analysis to the senior partner without review. The analysis contains an incorrect conclusion. Who is accountable according to the course?",
opts:["The AI provider is accountable because the incorrect conclusion was generated by their model without appropriate safeguards",
"The senior partner shares accountability because they should have known the analyst was using AI and required additional review",
"Accountability is shared equally between the analyst and the AI provider based on the proportion that was AI-generated",
"The junior analyst is accountable — they submitted the output as their work and are responsible for its accuracy regardless of how it was produced"],
correct:[3],cat:"analytical",
exp:"The course's accountability principle is unambiguous: 'You are accountable for the final output.' The 'sign your name' test asks: would you stake your reputation on this without edits? Submitting AI output as your own work means accepting full professional accountability for its accuracy and ethics. The AI provider creates the tool; the user is responsible for verifying and owning the output."},

{id:"m4q5",type:"single",q:"The course identifies four domains that require mandatory human oversight and describes them as 'human required.' Which of the following is NOT on the course's explicit list?",
opts:["Content creation and marketing communications",
"Hiring and firing decisions",
"Medical and health decisions",
"Legal and contract decisions"],
correct:[0],cat:"recall",
exp:"The course's Module 4 lists four domains as requiring mandatory human oversight: hiring and firing, medical and health, legal and contracts, and financial and investing. Content creation and marketing communications are not in this mandatory-oversight list — they are in the category where AI can accelerate work with appropriate review, not where human judgment is non-negotiable."},

{id:"m4q6",type:"single",q:"A team has been using AI for three months to classify support tickets. Initially they reviewed all classifications; now they review 5% spot-checks. Misclassification is causing routing errors that reach customers. What dynamic does the course's framework describe?",
opts:["The AI model is experiencing model drift — performance naturally degrades after three months without retraining on new ticket data","Automation complacency — as trust in the system grew, oversight effort decreased, and quality degraded because errors were no longer caught before they propagated","The team's spot-check sample size is statistically insufficient to detect systematic errors at 95% confidence level","The routing system has a separate bug unrelated to AI classification that the team is incorrectly attributing to AI errors"],
correct:[1],cat:"scenario",
exp:"The course addresses automation complacency explicitly in Module 4: 'Don't outsource your judgment; stay involved and keep your skills sharp.' As confidence in AI systems grows, human review effort tends to decrease. The course's lesson is that AI-assisted workflows require sustained oversight, not just initial setup. Reduced review reveals errors that were always present but previously caught by the 100% review process."},

{id:"m4q7",type:"single",q:"The course says 'AI-assisted vs. AI-dependent.' A copywriter who previously wrote first drafts independently now cannot start any piece of writing without AI generating an opening paragraph. What risk does the course identify?",
opts:["The copywriter will produce lower quality work because AI-generated opening paragraphs are stylistically distinct and undermine narrative coherence",
"The copywriter is violating their employer's AI use policy by using AI for creative tasks expected to be performed independently",
"Skills atrophy when not practised — if the copywriter can no longer perform core tasks without AI, they become fragile when AI is unavailable and lose the independent judgment that defines their professional value",
"This pattern is acceptable — the course endorses using AI to accelerate writing tasks including first-draft generation without reservation"],
correct:[2],cat:"analytical",
exp:"The course's AI-dependent vs. AI-assisted distinction is clear: 'You've outsourced understanding. Your skills are atrophying. You can't do it without AI. You've lost judgment and oversight.' The copywriter who cannot start without AI has crossed from assistance into dependency. Fragility when AI is unavailable is the key risk indicator the course identifies."},

{id:"m4q8",type:"single",q:"An employee asks: 'Should I disclose AI assistance when submitting a client deliverable?' According to the course, what is the correct guidance?",
opts:["Never disclose AI assistance on client deliverables — clients pay for professional expertise, not AI tools, and disclosure would undermine perceived value",
"Disclose only if the AI contributed more than 50% of the final content — small assistance with editing or structure does not require disclosure",
"Check with the AI provider — they specify in their terms of service whether outputs must be disclosed as AI-generated",
"Disclose AI assistance for client-facing deliverables — disclosure is increasingly expected in professional contexts and allows clients to make informed decisions about the nature of the work"],
correct:[3],cat:"recall",
exp:"The course's Module 4 disclosure guidance lists 'client-facing deliverables' explicitly in the 'disclose AI use' category. The course states: 'Disclosure is becoming standard — many institutions now require it.' For client deliverables specifically, the course recommends disclosure. The 50% threshold is not part of the course's framework; AI provider terms do not govern client disclosure."},

{id:"m4q9",type:"single",q:"The course states: 'Even authoritative-sounding outputs can be wrong — verify, question, and override when needed.' This principle is described as 'permission to push back.' What does this mean for professionals deferring to AI on domain questions?",
opts:["Domain expertise and lived experience should take precedence over AI outputs when they conflict — AI confidence is not authoritative, and professionals have both the right and responsibility to challenge AI conclusions",
"Professionals should always override AI outputs because human domain expertise is inherently more reliable than AI-generated content",
"Professionals should push back on AI by submitting the same question to multiple competing AI tools and selecting the most common answer",
"The push-back principle applies only to junior employees who lack the expertise to evaluate AI outputs; senior professionals should trust frontier model outputs directly"],
correct:[0],cat:"recall",
exp:"The course states: 'Disagree with AI, challenge its assumptions, ask for sources, and override it. Your judgment matters. Trust your domain expertise and lived experience over a plausible-sounding AI response.' AI confidence is not authoritative, and professionals with domain knowledge have both the standing and the obligation to question and override AI outputs when their expertise indicates the AI is wrong."},

{id:"m4q10",type:"single",q:"A product manager wants AI to automatically generate and send weekly performance reports to all department heads without human review. What does the course's human-in-the-loop principle say about this design?",
opts:["This design is acceptable — performance reports are a routine formatting task that AI handles reliably without review","The design violates human-in-the-loop for consequential outputs — weekly reports to department heads are organisationally significant and should have human review before distribution to catch errors before they reach senior audiences","The design requires only a spot-check of one in five reports — full review of every report is excessive for a routine recurring task","Human review is only required for reports that include financial data; operational performance reports can be fully automated"],
correct:[1],cat:"scenario",
exp:"The course's human-in-the-loop principle says AI should accelerate human judgment, not replace it — especially for consequential decisions. Weekly reports to department heads are organisationally significant: errors reach senior audiences, may affect decisions, and reflect on the producing team. The appropriate design is human review before distribution. The content type is not the criterion; the audience and consequence are."},

{id:"m4q11",type:"single",q:"The course identifies 'building your personal prompt library' as a key practice. What makes this practice compound over time in the way the course describes?",
opts:["Prompt libraries enable AI providers to optimise model performance for your specific use patterns, improving output quality progressively",
"Prompt libraries train the model on your preferences within a session, producing increasingly personalised outputs the more you use them",
"Proven prompts for recurring tasks eliminate rebuild time on every use, and sharing across the team multiplies the benefit — each person's best prompts become available to everyone",
"Collecting prompts in a library qualifies teams for volume discounts from AI providers who track prompt reuse rates"],
correct:[2],cat:"recall",
exp:"The course states: 'Save your best prompts for recurring tasks. Version them. Share with your team. Over time you'll have a reusable toolkit tailored to your work.' The compounding comes from two dimensions: individual reuse (a tested prompt saves time on every subsequent use) and team sharing (one person's best prompt becomes available to everyone). The library does not interact with model training, provider optimisation, or pricing."},

{id:"m4q12",type:"single",q:"The course's Module 4 describes enterprise tier versus consumer/free tier for AI tools. What is the most significant data governance difference for organisations handling client information?",
opts:["Enterprise tiers offer unlimited API calls while free tiers have rate limits that make them unsuitable for professional volumes",
"Enterprise tiers include built-in hallucination detection that filters false information before it reaches the user, which free tiers lack",
"Enterprise tiers route all requests through servers in the organisation's home country, satisfying data sovereignty requirements automatically",
"Enterprise tiers provide data isolation and typically do not use submitted content for model training — free tiers may store and train on inputs, creating data governance risk for client information"],
correct:[3],cat:"analytical",
exp:"The course's tier comparison is explicit: enterprise tier provides 'data isolation and encryption, no training on your data, SOC 2 and compliance certified.' The consumer/free tier has 'data may be stored, training on your inputs, basic privacy only.' The critical governance difference is training use: free tier inputs may be used to improve the model, meaning client confidential information submitted on a free tier may become part of the provider's training data."},

{id:"m4q13",type:"single",q:"The course states: 'You own the final output — you're responsible for its accuracy and ethics.' How does this principle apply when AI generates content with an error that the professional did not catch before submission?",
opts:["Full professional accountability applies — submitting AI-generated work as your own makes you responsible for its content, whether or not you generated it or caught every error",
"Professional liability is reduced because the error was introduced by AI, not by the professional's own analysis or judgment",
"Accountability is shared between the professional and the AI provider under their respective obligations of care",
"Professional accountability applies only if the error is intentional; unintentional AI errors that pass undetected are covered by AI provider indemnification"],
correct:[0],cat:"analytical",
exp:"The course's accountability principle has no carve-out for AI-generated errors that went undetected. Submitting work as your professional output means accepting responsibility for that output. The 'sign your name test' applies before submission. The course frames human review not as optional but as the professional standard that defines whether you have performed your role competently."},

{id:"m4q14",type:"single",q:"A legal firm wants AI to assist lawyers in preparing case briefs. According to the course's human-in-the-loop principle, what is the appropriate design for this workflow?",
opts:["AI generates the complete case brief and submits it directly to the court, with lawyers reviewing only the final judgment outcome","AI assists with research synthesis, initial drafting, and citation gathering; lawyers review, edit, verify all citations, and take full professional responsibility for the final brief submitted","AI is categorically unsuitable for legal work and should not be used in any part of the brief preparation workflow","AI assists junior associates only; senior partners should not interact with AI-generated content to preserve their independent judgment"],
correct:[1],cat:"scenario",
exp:"The course's human-in-the-loop model for high-stakes domains is: AI accelerates the preparation work, human exercises judgment on the substance and takes professional accountability for the output. Legal work is explicitly in the 'human required' domain. AI can assist with research and drafting; lawyers must review, verify citations, and take full professional responsibility for the final submission."},

{id:"m4q15",type:"single",q:"The course recommends 'anonymise and sanitise' as a technique before submitting content to AI tools. What does this involve in practice?",
opts:["Compressing documents to remove metadata before uploading them to AI tools to prevent provider access to file properties",
"Requesting that AI providers delete submitted content after each session using their data deletion API endpoint",
"Replacing real names, company identifiers, and personal details with placeholders before submitting — 'Client X' instead of the real name, 'Project Y' instead of the actual project name",
"Routing all AI requests through a VPN to mask the organisation's identity from the AI provider's logging systems"],
correct:[2],cat:"recall",
exp:"The course's Module 4 provides the before/after sanitisation example: 'John Smith at Acme Corp about our $5M contract renewal' becomes 'a client, a professional email about a contract renewal.' The technique is substituting real identifiers with placeholders before submission. VPNs, metadata removal, and deletion APIs do not address the content-level exposure that the course is concerned about."},

{id:"m4q16",type:"single",q:"The course distinguishes tasks where AI speeds you up from tasks where AI slows you down. Which factor most consistently determines which category a task falls into?",
opts:["Output length — longer outputs take more time to review and therefore slow the professional down relative to AI time savings",
"The professional's level of AI literacy — more experienced AI users find tasks speed up while beginners find tasks slow down initially",
"Task complexity — simple tasks always speed up with AI; complex tasks always slow down because prompting effort exceeds time savings",
"Whether the task requires context AI cannot possess versus context AI can work from — relationship history, live information, and emotional nuance slow AI down; information available in the prompt speeds AI up"],
correct:[3],cat:"analytical",
exp:"The course's categorisation of AI-fast versus AI-slow tasks is driven by context availability. Tasks that speed up are those where the relevant context can be provided in a prompt. Tasks that slow down require context AI cannot have: relationship nuance, real-time information, emotional intelligence, and accountability judgment. This is the consistent dividing principle in the course's framework."},

{id:"m4q17",type:"single",q:"The course identifies 'code generation' as in the AI-speeds-you-up category but also covers a risk in generated code. What is the primary verification requirement for AI-generated code before deployment?",
opts:["Review code for correctness, security issues, performance, and unintended behaviour — AI generates plausible code that may be syntactically correct but logically wrong or insecure",
"Check that the code compiles without errors — compilation success is the primary signal that AI-generated code is safe to deploy",
"Run the code once in a development environment — if it executes without crashing, it is safe for production deployment",
"Submit AI-generated code to the AI model itself for a secondary review — AI can detect its own code errors through self-verification"],
correct:[0],cat:"analytical",
exp:"The course's critique pattern for code specifies: 'Review this code for security issues, performance, and clarity.' The course also covers AI limitations including hallucinated API functions that do not exist. Compilation success is necessary but not sufficient — code can compile while being logically wrong, insecure, or calling non-existent libraries. Professional code review standards apply to AI-generated code."},

{id:"m4q18",type:"single",q:"An executive says: 'I want our AI to make the hiring decision based on CV analysis — remove human bias from the process.' The course's framework suggests what response?",
opts:["This is an appropriate use of AI — algorithmic decision-making removes human inconsistency and produces fairer outcomes in structured evaluation tasks","Hiring is explicitly in the 'human required' domain — AI can assist with CV screening and shortlisting but the hiring decision requires human accountability; also, AI trained on historical hiring data may replicate rather than remove bias","AI is suitable for hiring decisions only if the algorithm is validated on diverse candidate pools with quarterly bias audits","Remove human bias by using AI ranking rather than human ranking but add a human override mechanism for borderline cases"],
correct:[1],cat:"scenario",
exp:"The course addresses this exact framing in two ways: Module 4 lists 'hiring and firing' as requiring human oversight, and Module 3 covers how AI bias comes from training data including historical hiring decisions. An AI trained to 'remove bias' by learning from historical hiring data may replicate the biases embedded in those decisions. Hiring decisions require human accountability."},

{id:"m4q19",type:"single",q:"The course states: 'It is a good idea to change session when context might not be very relevant.' What cost problem does this practice address?",
opts:["Starting new sessions prevents the AI provider from building a profile of your usage patterns that could affect your pricing tier",
"Session length limits are enforced by providers at 100 messages; changing sessions before this limit prevents service interruption",
"Irrelevant conversation history in a long session accumulates in the context window and is billed as input tokens on every subsequent message — starting fresh removes this accumulated cost without sacrificing useful context",
"Long sessions cause context window overflow which silently truncates early instructions, making responses unpredictable"],
correct:[2],cat:"analytical",
exp:"The course states in Module 5's cost optimisation section: 'It is a good idea to change session when the context might not be very relevant. No need to let irrelevant context eat up the tokens.' Each message in a conversation re-sends the full conversation history — old, irrelevant exchanges are billed as input tokens on every new message. Starting a new session when past context is no longer relevant eliminates this compounding cost."},

{id:"m4q20",type:"single",q:"A operations team uses AI to summarise meeting notes for distribution to all attendees. Three months in, a senior leader discovers a summary contained incorrect action items attributed to her. What does the course's human-in-the-loop principle say about this workflow?",
opts:["This was an acceptable risk — summarisation accuracy for internal communications does not require human review",
"The workflow is fine but should use a frontier model which produces more accurate summaries for this use case",
"The AI model should be retrained on past meeting notes to improve its accuracy on this specific summarisation task",
"Meeting summaries that record commitments and action items attributed to named individuals require human review before distribution — errors in recorded commitments have real professional consequences and cannot be corrected once distributed"],
correct:[3],cat:"scenario",
exp:"The course's human-in-the-loop principle applies when consequences are significant. Meeting summaries recording action items attributed to named individuals are consequential: errors can result in wrong people being held accountable, correct commitments being missed, and professional embarrassment when distributed to all attendees. Human review before distribution — even a quick skim by the note-taker — is the appropriate quality gate."},
],
5:[
{id:"m5q1",type:"single",q:"The course states: 'Tokens are not words.' An engineer estimates their 1,000-word prompt will cost the same as any other 1,000-word prompt. What makes this estimate unreliable?",
opts:["Code and non-English text use more tokens per character than English prose — a 1,000-word prompt containing SQL code or Japanese text will consume significantly more tokens than a 1,000-word English prose prompt",
"Word count is an accurate proxy for token count in all professional contexts; the engineer's estimate is correct",
"Different AI providers charge per word rather than per token, so the distinction is irrelevant for cost estimation",
"Token count is always exactly 1.33 times word count in any language or content type, making word count a reliable estimate"],
correct:[0],cat:"recall",
exp:"The course explicitly states: 'Code and non-English text use more tokens per character than prose.' The rule of thumb (750 words equals 1,000 tokens) applies to English prose. Code tokenises differently — structural elements and variable names consume tokens at a different ratio. Non-Latin scripts use more tokens per character. A mixed prompt cannot be estimated from word count alone."},

{id:"m5q2",type:"single",q:"The course explains that output tokens typically cost 2-5x more than input tokens. What architectural reason does the course give for this pricing difference?",
opts:["Output tokens carry more intellectual property value because they are generated by the model's unique learned representations","Input tokens are processed in parallel; output tokens are generated sequentially one at a time in an autoregressive process — sequential generation is computationally more intensive per token","AI providers price output tokens higher to incentivise users to write detailed prompts that reduce the need for extensive model responses","Output tokens include the cost of safety filtering layers that are applied only to generated content, not to input content"],
correct:[1],cat:"recall",
exp:"The course states: 'Output is more expensive — generation is computationally expensive.' The architectural reason is autoregressive generation: each output token is generated one at a time, with each step depending on all previous outputs. Input processing can be parallelised. This sequential, dependent generation is computationally costlier per token, justifying the higher price differential."},

{id:"m5q3",type:"single",q:"A product team is building an AI feature that processes 10,000 documents overnight for compliance tagging. The course describes two API modes. Which should they use and why?",
opts:["Streaming API — real-time token-by-token responses allow the team to monitor processing quality as it happens overnight",
"Real-time API — processing in real-time allows errors to be caught immediately rather than discovering failures the next morning",
"Batch API — non-realtime bulk processing at 50% cost discount is the appropriate choice when turnaround time is not the constraint",
"The choice depends on document length — longer documents must use the real-time API due to context window management requirements"],
correct:[2],cat:"scenario",
exp:"The course describes batch API explicitly: 'Process large volumes overnight. Much cheaper, 50% discount, ideal for bulk analysis.' For non-time-sensitive compliance tagging of 10,000 documents, the 50% cost reduction of batch processing is a clear win. The team can review outputs the next morning. Streaming is for user-facing real-time applications. Document length does not determine which API to use."},

{id:"m5q4",type:"single",q:"The course's prompt optimisation example shows a reduction from 850 tokens to 120 tokens for a summarisation task. The course claims 'same quality.' What principle enables this compression without quality loss?",
opts:["Frontier models are more efficient than balanced models and require fewer instruction tokens to produce the same quality output",
"Compression works for summarisation tasks specifically because summarisation is the simplest AI task type that requires minimal instruction",
"Shorter prompts always produce better quality because they force the model to apply greater creativity to interpret minimal instructions",
"Removing redundant preamble and vague qualifiers leaves only the specific instruction — the model gets the same signal from a tight prompt as from a bloated one with filler phrases"],
correct:[3],cat:"analytical",
exp:"The course's before/after example removes: 'You are an expert assistant. Please analyze the following document and provide a comprehensive summary. Consider all aspects including but not limited to...' leaving 'Summarize this document in 3 bullet points.' The removed words were preamble and qualifiers that added no signal — the model infers the task equally well from the core instruction. Frontier tier, task type, and creativity are not the explanation."},

{id:"m5q5",type:"single",q:"The course introduces prompt caching. A team uses a 12,000-token system prompt containing their product knowledge base in every API call, making 2,000 calls monthly. What does prompt caching specifically save them?",
opts:["Prompt caching stores the pre-computed processing of the repeated system prompt — subsequent calls referencing that same prefix avoid re-processing those 12,000 tokens, reducing input token charges by 50-90% for the cached portion",
"Prompt caching stores the model's output from each call and reuses it for identical subsequent requests, eliminating API calls for common questions",
"Prompt caching compresses the 12,000-token system prompt into a smaller vector that produces identical results at lower token cost",
"Prompt caching allows teams to exceed their monthly token limit without additional charges by crediting cached content as free tokens"],
correct:[0],cat:"recall",
exp:"The course defines prompt caching: 'If you repeatedly use the same system prompt or reference documents, prompt caching saves 50-90%. Without caching: 10,000 tokens times 100 requests equals 1M tokens. With caching: 10,000 tokens on first call plus small overhead on subsequent calls equals roughly $0.50.' Caching stores the computed key-value representations of the repeated prefix. It does not reuse outputs, compress tokens, or affect usage limits."},

{id:"m5q6",type:"single",q:"The course identifies the 'lost in the middle' problem for large context windows. A team sends a 150,000-token context with critical instructions embedded at position 75,000. What risk does this create?",
opts:["Token position 75,000 exactly marks the midpoint, which is processed first by the attention mechanism — midpoint content receives maximum attention","Attention quality drops for content in the middle of very long contexts — instructions embedded at the midpoint may receive less model attention than those at the start or end, reducing their influence on the output","All tokens in a context window receive identical attention regardless of position — 'lost in the middle' refers to user interface display issues, not model processing","The 12,000-token limit for system prompts means instructions beyond that position are automatically moved to the start by the API"],
correct:[1],cat:"analytical",
exp:"The course states: 'A 200K window doesn't mean equal attention to all 200K tokens. Attention is strong at the start and end, but dips in the middle.' Critical instructions buried at the midpoint of a 150,000-token context are at risk of receiving less model attention and therefore less influence on the output. Best practice is to place critical instructions prominently."},

{id:"m5q7",type:"single",q:"The course recommends 'use the right model.' A startup pays for Claude Opus on every support ticket, including simple greetings and FAQs. What specific reallocation does the course's tiering framework suggest?",
opts:["Downgrade to the free tier for all tickets to reduce costs — support quality differences between tiers are imperceptible to customers",
"Replace the AI chatbot with a rule-based FAQ system for all simple tickets — AI is unnecessary overhead for well-defined support scenarios",
"Route simple FAQs and greetings to a fast-cheap model (Haiku tier) and reserve the balanced or frontier tier for complex issue resolution — this can cut costs 50-90% while maintaining quality where it matters",
"Use the batch API for all support tickets by queuing them overnight and delivering responses the next business day"],
correct:[2],cat:"scenario",
exp:"The course states: 'Use Haiku for simple tasks, Sonnet for balance, Opus for complex reasoning.' Fast-cheap models handle classification, FAQ matching, and simple greetings with equivalent quality to frontier models. Using Opus for routine greetings is significant overpayment. The course's multi-model workflow pattern routes by complexity: fast-cheap for simple inputs, balanced or frontier for complex resolution."},

{id:"m5q8",type:"single",q:"The course gives cost examples: email draft ($0.002), article summary ($0.015), codebase analysis ($0.50). What accounts for the 250x difference between the cheapest and most expensive of these tasks?",
opts:["Codebase analysis uses a more expensive model tier than email drafting, and the tier price difference accounts for most of the cost gap",
"Codebase analysis requires multiple API calls while email drafting requires only one, and the cost difference reflects the number of requests",
"Output token pricing for code is higher than for prose because code generation requires more computational effort than text generation",
"Input and output token volumes differ dramatically by task — codebase analysis sends approximately 50,000 input tokens versus 500 for an email draft, and the token volume difference drives the cost difference"],
correct:[3],cat:"analytical",
exp:"The course provides the specific numbers: email (500 input, 200 output tokens), article summary (3,000 input, 500 output), codebase analysis (50,000 input, 5,000 output). The cost driver is token volume. At the same per-token rate on the same model, 50,000 input tokens costs 100x more than 500 input tokens. Model tier, request count, and content-type pricing are not the primary explanation — token volume is."},

{id:"m5q9",type:"single",q:"A team notices their monthly AI cost grew 60% while user count grew only 10%. The course identifies 'prompt bloat' as a likely culprit. What specifically is prompt bloat?",
opts:["Prompt bloat occurs when system prompts and context grow through accumulated additions — more instructions, more examples, more context — without removing content that no longer improves output quality",
"Prompt bloat is when users submit excessively long queries — the solution is to enforce a character limit on user inputs",
"Prompt bloat is a provider-side issue where the AI company charges for hidden processing tokens not visible in the usage dashboard",
"Prompt bloat refers to redundant API calls where the same prompt is submitted multiple times due to client-side retry logic errors"],
correct:[0],cat:"recall",
exp:"The course's Module 5 covers prompt bloat in cost optimisation: 'As products evolve, teams add more instructions to system prompts, append more context, add more few-shot examples, and expand output format requirements. Each addition increases token count per request.' Across millions of requests, a 30% prompt growth creates a 30% cost increase independent of user growth."},

{id:"m5q10",type:"single",q:"The course states: 'Output is more expensive — add respond in under 200 words to your prompt.' Why does this instruction reduce costs, and what is the risk of overusing it?",
opts:["The instruction activates a compressed generation mode that produces equivalent content in fewer tokens through internal model optimisation","The instruction reduces output token count, directly reducing cost — the risk is that tasks genuinely requiring longer outputs will be truncated to meet the word limit, degrading quality for complex responses","The instruction signals to the AI provider that brevity is acceptable, triggering a discount rate on output tokens for that session","The instruction works only for prose outputs — for code or structured data outputs, token limits must be specified in token counts, not word counts"],
correct:[1],cat:"analytical",
exp:"Output token cost is direct and proportional: fewer output tokens equals lower cost. Adding a length constraint reduces output token count immediately. The risk is task-instruction mismatch: a complex analysis genuinely requiring 800 words, constrained to 200, will be truncated and incomplete. The course's principle is to limit output to what the task actually requires — not to impose arbitrary brevity regardless of task complexity."},

{id:"m5q11",type:"single",q:"The course recommends 'batching similar tasks' as a cost optimisation. A team currently sends 50 individual API calls to classify 50 emails. What does the course's batching principle suggest?",
opts:["Submit the 50 calls simultaneously using parallel threading — sending them at the same time reduces wall-clock time but does not change total token cost",
"Use the batch API to queue all 50 emails for overnight processing — the 50% batch discount applies regardless of whether they are submitted together or separately",
"Process all 50 emails in a single API call by listing them all in one prompt with clear separators — this reduces 50 request overheads to one and can significantly reduce per-request infrastructure costs",
"Combine every two emails into a single request — AI providers offer per-request pricing that makes 25 requests significantly cheaper than 50 requests"],
correct:[2],cat:"analytical",
exp:"The course's batching principle refers to processing multiple items in one API call rather than one-by-one. By listing all 50 emails in a single structured prompt, the team pays one set of per-request overhead and the system prompt tokens are charged once. The 50 individual calls each charge system prompt tokens separately. This reduces both request overhead and system prompt token costs when the same instructions apply to all items."},

{id:"m5q12",type:"single",q:"The course's cost comparison shows: 'No optimisation: $450 monthly. All tactics combined: $35 monthly.' Which single tactic has the highest potential impact according to the course's savings estimates?",
opts:["Output limits at 20-40% savings — reducing output length is the highest-impact single optimisation across all use cases",
"Prompt optimisation at 30-50% savings — removing bloated instructions is the highest-ROI first step before any other optimisation",
"Monitoring at no direct savings — but monitoring reveals which other tactics to apply first and therefore has the highest indirect impact",
"Model selection at 50-90% savings or prompt caching at 50-90% savings — these two tactics tie for the highest potential impact depending on the specific usage pattern"],
correct:[3],cat:"analytical",
exp:"The course's savings-by-tactic table shows: model selection 50-90%, prompt caching 50-90%, prompt optimisation 30-50%, output limits 20-40%. Both model selection and prompt caching tie for the highest potential impact range. The dominant driver depends on the specific application: if using a large system prompt on thousands of daily requests, caching dominates; if using a frontier model for simple classification, model selection dominates."},

{id:"m5q13",type:"single",q:"The course explains the difference between the chat UI and the raw API. A developer building a customer support application needs consistent, cost-efficient AI without default assumptions. Which interface should they use?",
opts:["Raw API — full control over system prompt, no default assumptions, no session management overhead, lower per-token cost, and direct suitability for application integration",
"Chat UI — the built-in session management and optimised default system prompt provide a better baseline for customer support applications",
"Chat UI — safety guardrails built into the chat interface are legally required for any customer-facing AI application",
"Either interface — they produce identical outputs because they use the same underlying model, differing only in user interface design"],
correct:[0],cat:"scenario",
exp:"The course's comparison shows: chat UI adds session management, default system prompt, and safety layers. These add overhead and default behaviours the developer may not want. The raw API gives full control: the developer writes their own system prompt with exactly the behaviours needed, manages session state themselves, and gets lower per-token cost. For application integration requiring consistency and control, raw API is the correct choice."},

{id:"m5q14",type:"single",q:"The course introduces RAG as a context window strategy. How does RAG specifically reduce token costs compared to sending entire document sets with every query?",
opts:["RAG uses a compressed document embedding format that stores documents at 10% of their original token size in the model's memory","RAG retrieves only the 3-5 most relevant document sections for each specific query — instead of sending the full document set potentially costing hundreds of thousands of tokens, only the relevant excerpts enter the context window","RAG processes documents once during an indexing phase and charges nothing for retrieval — all subsequent query costs are zero for the document portion","RAG uses a separate cheaper model for document processing, charging those tokens at a lower rate than the main model's context window pricing"],
correct:[1],cat:"analytical",
exp:"The course explains RAG as: retrieve relevant snippets, only send what is needed. Instead of loading all reference documents into every context window, RAG searches for the specific relevant sections for each query and includes only those. A 200-page policy manual sent with every query costs thousands of tokens; the 3 relevant paragraphs retrieved by RAG cost hundreds. This targeted retrieval is the token efficiency mechanism."},

{id:"m5q15",type:"single",q:"A team lead asks: 'What should we track monthly to manage AI costs effectively?' The course recommends specific metrics. Which set does it specify?",
opts:["Total API calls per month, average response time per call, user satisfaction score, and error rate per model tier",
"Total monthly spend versus budget, number of prompts submitted per user, and average session length across the team",
"Total tokens used (input vs. output separately), cost per task, model distribution across tiers, and cache hit rate if using caching",
"Hallucination rate per model, user override frequency, and ratio of AI-assisted to fully-AI-automated tasks"],
correct:[2],cat:"recall",
exp:"The course's Module 5 monitoring section specifies exactly: 'Track these metrics monthly: Total tokens used (input vs. output), Cost per task, Model distribution (percentage Haiku, percentage Sonnet, etc.), Cache hit rate if using caching.' These four metrics together reveal where costs are concentrated, whether the model tier mix is optimised, and whether caching is effective."},

{id:"m5q16",type:"single",q:"The course describes a case study: 'A customer support team processed 1,000 tickets/month with Opus at $150. By switching to Sonnet with caching, they reduced costs to $18 while maintaining quality.' What does this case study demonstrate?",
opts:["Opus and Sonnet produce different quality outputs — the team accepted lower quality in exchange for the cost reduction",
"The team's original prompts were poorly designed, causing Opus to use excessive tokens that Sonnet's more efficient architecture avoided",
"Switching models always requires prompt redesign — the cost saving was achieved through re-engineering, not just tier switching",
"Defaulting to the highest capability model for all tasks overpays for simple, repeatable work that a balanced model handles equivalently — caching amplifies savings when system prompts are reused"],
correct:[3],cat:"analytical",
exp:"The case study illustrates two compounding optimisations: model tier selection (Opus to Sonnet) and prompt caching. For repeatable support tickets with a consistent system prompt, Sonnet handles the task quality equivalently to Opus at a fraction of the cost. Caching the repeated system prompt then saves 50-90% of that already-reduced cost. The course's lesson: defaulting to frontier for all work is an expensive default."},

{id:"m5q17",type:"single",q:"The course explains that chat UIs 'fake memory' by re-sending conversation history. What practical cost implication does this have for long conversations?",
opts:["Each new message in a long conversation re-sends all previous messages as input tokens — a 10-message conversation charges the full history as input on message 10, compounding token costs as the conversation grows",
"Long conversations improve cost efficiency because later messages are shorter once context is established, reducing average token cost per message",
"Chat UIs compress conversation history using proprietary algorithms that reduce the token count of older messages to control costs",
"AI providers offer conversation-length pricing that charges a flat fee for sessions rather than per-token pricing for history re-sending"],
correct:[0],cat:"analytical",
exp:"The course explains: 'Chat UIs fake memory by re-sending the conversation history each time.' This means message 10 in a conversation includes messages 1-9 as input tokens in addition to message 10 itself. A long 20-message conversation accumulates significant input token costs from history re-sending. This is why the course recommends starting new sessions when prior context is no longer relevant."},

{id:"m5q18",type:"single",q:"A team debates whether to use Claude Haiku or Claude Sonnet for a high-volume email classification task at 100,000 emails per day. The course's tiering principle says what?",
opts:["Always use Sonnet for business-critical tasks — classification errors from Haiku could damage customer relationships and the cost difference is modest at scale","Start with Haiku — classification is explicitly listed as a fast-cheap tier use case; only upgrade to Sonnet if Haiku's quality is visibly insufficient for this specific task","Use 80% Haiku and 20% Sonnet regardless of email complexity — this blended approach is the course's recommended default for high-volume classification","The cost difference is too large to justify using Sonnet — Haiku is always the correct choice for any high-volume task regardless of quality requirements"],
correct:[1],cat:"analytical",
exp:"The course's tiering table lists 'Classification, labeling' as 'Fast-Cheap' tier with the note: 'Binary or categorical decisions don't need frontier reasoning.' The course also says: 'Start with fast-cheap. It's 10x cheaper and often good enough. Upgrade only when insufficient.' For email classification, Haiku is the appropriate starting tier. If classification quality proves insufficient, then upgrading is justified — but the course directs starting at Haiku."},

{id:"m5q19",type:"single",q:"The course mentions that code and non-English text use more tokens per character than prose. Why does this matter for a global enterprise deploying AI for customer communications in 18 languages?",
opts:["It does not matter — AI providers offer flat-rate multilingual pricing that normalises token costs across all languages",
"The enterprise should use English-only AI and translate outputs using a separate cheaper translation service to avoid high token costs for non-English languages",
"Token consumption and therefore cost will be higher for communications in high-token-density languages like Japanese, Arabic, or Chinese compared to equivalent English communications — cost modelling must account for language-specific token ratios",
"Providers offer discounted token rates for certified enterprise multilingual deployments that offset the higher per-character token cost for non-Latin scripts"],
correct:[2],cat:"analytical",
exp:"The course's token rule of thumb applies to English prose. Non-Latin scripts like Japanese, Arabic, and Chinese tokenise differently — more tokens per character. For an enterprise processing millions of customer communications in 18 languages, actual costs for non-English languages will exceed estimates based on English token ratios. Cost modelling and budget forecasting must account for language-specific token density to avoid significant budget overruns."},

{id:"m5q20",type:"single",q:"A product manager uses the phrase 'context window as the model's working memory' from the course. What does this analogy specifically mean for designing AI features that handle large documents?",
opts:["The context window stores results between sessions like computer RAM stores data between power cycles — larger windows enable the model to remember more over time",
"The context window determines only the maximum response length — input documents of any size can be submitted without affecting available response tokens",
"The context window is a user interface display limit, not a model processing limit — large documents are processed in full even when the UI shows a truncation warning",
"Everything the model can reference in generating a single response must fit within the context window — documents larger than the window are truncated or must be chunked, and adding long documents directly consumes the space available for instructions and response"],
correct:[3],cat:"recall",
exp:"The course explains: 'Context window: Everything the model sees in one call (system prompt + history + your message + response).' The working memory analogy captures that the context window is the total capacity for one inference call — all content competes for this space. A long document consumes tokens that could hold instructions, history, or response space. Documents exceeding the window are truncated silently. This is why RAG is the practical solution for large document workflows."},
],
6:[
{id:"m6q1",type:"single",q:"The course introduces a four-dimension framework for model selection: reasoning depth, output length, speed, and cost sensitivity. A team must process 500,000 contract clauses monthly for risk flagging. Which dimension is most decisive?",
opts:["Cost sensitivity — at 500,000 monthly tasks, per-token cost is the dominant economic variable that determines whether the feature is viable",
"Reasoning depth — contract risk flagging requires sophisticated legal reasoning only available in frontier models",
"Output length — each clause produces a short flagged or unflagged output, making this dimension the primary driver",
"Speed — clause processing must happen in real time to support lawyer workflows, making latency the overriding criterion"],
correct:[0],cat:"analytical",
exp:"The course states: 'Is this a one-off request or 10,000 requests per day?' At 500,000 monthly clauses, cost per token is the critical variable — a 10x cost difference between fast-cheap and balanced models is a 10x difference in feature economics. If fast-cheap models achieve adequate flagging accuracy, the cost case for fast-cheap is overwhelming. Reasoning depth matters for complex analysis; at scale, adequate quality at lowest cost is the framework."},

{id:"m6q2",type:"single",q:"The course describes Claude as having 'Constitutional AI, thoughtful by design, fewer surprises.' What practical implication does this safety philosophy have for enterprise deployments?",
opts:["Claude will refuse more requests than other models, making it less useful for creative or open-ended professional tasks","Claude's instruction-following and safety design reduces the frequency of unexpected output behaviours — important for enterprise deployments requiring consistent, predictable AI behaviour across thousands of users","Claude produces lower quality outputs than competing models because safety constraints limit its creative and reasoning capabilities","Claude's safety design means it never requires a system prompt — the model's built-in constraints replace the need for explicit guardrails"],
correct:[1],cat:"analytical",
exp:"The course describes Anthropic's Claude as having a 'safety-focused design' and 'thoughtful by design, fewer surprises' — specifically in the context of enterprise deployment. For organisations deploying AI to hundreds of employees, predictable consistent behaviour reduces the risk of unexpected outputs reaching clients or stakeholders. This is about output consistency and reduced edge-case surprises, not capability limits or replacing system prompts."},

{id:"m6q3",type:"single",q:"The course states: 'Performance on standard benchmarks often doesn't reflect real-world differences.' A team selects a model based on its 94% MMLU score over an alternative with 89%, then finds the 89% model produces better outputs for their specific task. What does the course's framework predict explains this?",
opts:["The benchmark scores were fraudulently inflated by the higher-scoring provider to gain market share",
"The team ran insufficient trials — with more test documents, the 94% benchmark model would consistently outperform",
"Benchmarks measure general capability on standardised tests — your specific task's characteristics may align better with the lower-scoring model's training or fine-tuning",
"MMLU measures reading comprehension only; it is inapplicable to any task involving data analysis or structured output"],
correct:[2],cat:"analytical",
exp:"The course is explicit: 'Evaluate models on a representative sample of your actual use case before selecting based on generic benchmark rankings.' Benchmarks measure capability on the benchmark's specific questions. A model's performance on your specific domain, query types, and output requirements may diverge significantly from its benchmark ranking. Testing on your own data is the correct evaluation method."},

{id:"m6q4",type:"single",q:"The course includes Llama 3 and Mistral as model options with the category label 'sensitive data.' What specific capability makes open-source models the preferred choice for this category?",
opts:["Open-source models have been independently audited for security vulnerabilities by the research community, making them more secure than closed commercial models",
"Open-source models are exempt from GDPR data processing requirements because they are not commercial services provided to data subjects",
"Open-source models include built-in data anonymisation that strips PII from inputs before processing, protecting sensitive data automatically",
"Open-source models can be self-hosted on private infrastructure — data never leaves the organisation's own environment, eliminating API transmission risk for sensitive information"],
correct:[3],cat:"recall",
exp:"The course's model comparison table lists Llama 3 and Mistral as 'open-source, self-hostable, no API costs at scale' and identifies 'sensitive data, private infrastructure' as the primary use case. Self-hosting means the model runs on the organisation's own servers — sensitive inputs never traverse an external API. There is no independent security audit advantage, no GDPR exemption for open-source, and no built-in PII anonymisation."},

{id:"m6q5",type:"single",q:"The course's model selection decision tree starts with: 'Is the task complex reasoning? YES then consider Frontier. NO then is speed critical? YES then Fast-Cheap. NO then Balanced.' An analyst needs to summarise 50-page strategy documents for board presentations. Where does this task land?",
opts:["Speed not critical and not complex reasoning then Balanced, because summarisation is in the balanced tier's task table and board presentation quality is achievable at medium cost",
"Complex reasoning then Frontier, because board-level documents require the highest quality analysis available",
"Speed critical then Fast-Cheap, because board members need summaries quickly and latency matters more than depth",
"Either Frontier or Balanced depending on document sensitivity — sensitive strategy documents require Frontier's superior data handling"],
correct:[0],cat:"scenario",
exp:"The course's task-model matching table lists 'Summarization' as 'Balanced (can use Fast-Cheap)' noting 'Balanced handles nuance well.' Summarising strategy documents is not complex multi-step reasoning requiring frontier — it is long-form synthesis, which balanced models handle well. Speed is not the primary constraint for board prep work. Document sensitivity is a data handling concern, not a quality-tier concern."},

{id:"m6q6",type:"single",q:"The course says: 'Revisit model selection quarterly.' What change in the AI landscape makes this recommendation necessary?",
opts:["AI providers update pricing every quarter and the cost-optimal model changes as prices shift relative to each other","Model capabilities evolve rapidly — a task that needed frontier-tier quality three months ago may work well on balanced-tier now, and new models with different capability profiles may have launched","Quarterly review is required by enterprise AI licence agreements to confirm continued compliance with approved model versions","Model performance degrades over time from inference volume — quarterly re-evaluation identifies models that have degraded below acceptable quality thresholds"],
correct:[1],cat:"recall",
exp:"The course states: 'A task that needed frontier 3 months ago might work great on balanced now. Stay flexible.' The AI model landscape evolves rapidly — capability improvements at balanced-tier levels mean tasks that previously required frontier now fit balanced. New model releases may offer better capability-cost ratios. Quarterly review ensures model selection remains optimal rather than fixed on the initial choice."},

{id:"m6q7",type:"single",q:"The course describes reasoning models (GPT-o3, Claude with extended thinking) as 'thinking before answering.' For which task does the course say this capability is worth the additional cost and latency?",
opts:["Writing a professional email to a client about a delayed project — tone and structure require careful consideration before drafting",
"Summarising a 10-page meeting transcript — the additional thinking tokens improve extraction accuracy for long documents",
"Multi-step strategic planning and complex analysis where the model benefits from arguing with itself and exploring multiple reasoning paths before concluding",
"Classifying customer support tickets into predefined categories — reasoning models reduce misclassification rates on ambiguous tickets"],
correct:[2],cat:"recall",
exp:"The course's 'When reasoning models win' list includes: 'Math and logic puzzles, multi-step planning, complex analysis, ambiguous problems, strategic reasoning.' The 'overkill' list includes: 'Writing and summarisation, simple Q&A, classification, boilerplate code, basic brainstorming.' Strategic planning with genuine multi-step ambiguity is precisely the reasoning model use case. Email drafting, summarisation, and ticket classification are all in the overkill category."},

{id:"m6q8",type:"single",q:"The course presents a capability comparison showing Claude's 200K context window versus GPT-4o's 128K and Gemini's 1M. When does this context window difference become a meaningful selection criterion?",
opts:["Always — larger context windows always produce better outputs because the model has access to more information",
"Context window size directly correlates with model intelligence — the 1M window model is always the most capable for complex reasoning",
"Context window differences only matter for consumer applications — enterprise deployments use chunking regardless of context window size",
"Only when the task specifically requires processing documents or conversation histories that exceed the smaller model's context window — for most tasks, the difference is irrelevant"],
correct:[3],cat:"analytical",
exp:"The course identifies context window as 'actually matters' — specifically noting 'Claude wins for long documents.' But this only matters when the task involves content that pushes against or exceeds the smaller context window. For most professional tasks — emails, summaries, short-form analysis — any of these context windows is more than sufficient. The selection criterion activates when processing long contracts, codebases, or multi-hour meeting transcripts."},

{id:"m6q9",type:"single",q:"A team asks: 'Should we use OpenAI or Anthropic for our new customer-facing AI feature?' The course's practical guidance for this decision is what?",
opts:["Base the choice on ecosystem fit and use case, not benchmark scores — OpenAI for broad integrations and structured output; Anthropic for long context and safety philosophy; Google for Workspace users; the marginal performance difference is overstated",
"Always choose OpenAI — it has the widest integrations and community support, making it the safest default for new enterprise deployments",
"Always choose whichever provider scored highest on the most recent MMLU benchmark — benchmark rankings directly reflect production performance differences",
"Run a six-month A/B test with both providers before committing — the only reliable way to select is empirical production comparison"],
correct:[0],cat:"recall",
exp:"The course explicitly states: 'Pick a provider based on your ecosystem and use case, not benchmark scores. For most teams: OpenAI for broad integrations, Anthropic for long context plus safety, or Google for Workspace users. Marginal performance differences matter less than integration friction and cost predictability.' The course also notes: 'One model is universally better' is an overstated distinction."},

{id:"m6q10",type:"single",q:"The course's '80/20 rule' for model tiers states: 'Most teams end up using balanced models for 80% of tasks.' What does the course imply about the 20% that uses frontier models?",
opts:["The 20% on frontier models represents a cost inefficiency that all teams should work to eliminate by improving their prompting skills","The 20% frontier usage represents genuinely complex tasks — strategic reasoning, ambiguous multi-step analysis, complex document synthesis — where balanced-tier quality is verifiably insufficient","The 20% on frontier is a compliance requirement for high-stakes professional outputs that must use the highest available capability tier","Teams should aim for 0% frontier usage by developing sufficient prompting expertise to achieve acceptable quality on balanced models for all tasks"],
correct:[1],cat:"analytical",
exp:"The course's tiering principle is quality-threshold-driven: use balanced for tasks where it achieves adequate quality; use frontier only when balanced's output is 'visibly insufficient.' The 20% frontier usage represents the tasks where balanced genuinely falls short — complex reasoning, ambiguous strategic analysis, creative synthesis. The course does not frame frontier usage as inefficiency to eliminate."},

{id:"m6q11",type:"single",q:"The course describes Gemini's native multimodal capability as a genuine differentiator. For which specific enterprise workflow does the course suggest this provides the strongest advantage?",
opts:["Financial modelling — Gemini's multimodal processing enables it to analyse numerical data more accurately than text-only models",
"HR and people management — multimodal AI can analyse body language and facial expressions in video interviews to improve hiring decisions",
"Video and audio analysis and deep Google Workspace integration — native multimodal means processing images, video, and audio without separate pipelines, and tight Workspace integration adds value for Google-native enterprises",
"Security and compliance — multimodal AI can detect sensitive information in images and documents simultaneously in a single compliance workflow"],
correct:[2],cat:"recall",
exp:"The course's Gemini entry states: 'Native multimodal (video, audio), 1M+ token context window, Google Workspace integration. Best for: Video/audio analysis, Workspace users, massive documents.' Financial modelling is not highlighted as a Gemini strength; video interview facial analysis is an ethically problematic application the course does not endorse; security compliance is not listed as a Gemini-specific advantage."},

{id:"m6q12",type:"single",q:"The course warns about 'overstated versus actual differences' between providers. Which difference does the course identify as genuinely impactful rather than marketing noise?",
opts:["Output quality on general writing tasks — the difference between providers on prose quality is large and drives significant user experience differences",
"Model parameter count — larger parameter counts reliably predict better performance on all tasks regardless of task type",
"Response time — one provider is consistently 2-3x faster than all others for any given task type, creating a reliable latency advantage",
"Ecosystem and integrations, context window size, pricing model, and safety philosophy — these are the practical differences that affect deployment, not benchmark scores within 1-3%"],
correct:[3],cat:"recall",
exp:"The course's 'Actually Matters' list includes: 'Ecosystem and integrations, Context window (Claude wins for long documents), Pricing model and volume discounts, Safety philosophy and instruction-following style, API availability, rate limits, geographic coverage.' The 'Overstated' list includes: 'Performance on standard benchmarks within 1-3% for most tasks, one model is universally better, quality gap is huge between providers.'"},

{id:"m6q13",type:"single",q:"The course includes a task-to-model matching table. An engineer needs to build a feature that generates real-time responses to user questions about current competitor pricing. Which model combination does the course's table suggest?",
opts:["Perplexity or Gemini with browsing — these have built-in search integration enabling real-time web answers, which current competitor pricing inherently requires",
"Claude Opus — long context window handles competitor data comprehensively and frontier reasoning produces accurate pricing analysis",
"GPT-4o-mini — high-volume, low-cost model for price queries since pricing questions are classification tasks with simple categorical outputs",
"Llama 3 self-hosted — competitor pricing data is sensitive internal information that must be processed on private infrastructure"],
correct:[0],cat:"scenario",
exp:"The course's task matching table includes: 'Real-time Web Search — Perplexity/Gemini — Built-in search integration, real-time answers.' Current competitor pricing is dynamic — prices change and require live retrieval. Claude Opus has a knowledge cutoff and no live data by default; GPT-4o-mini is for classification not retrieval; Llama self-hosted has no web access. Only web-enabled models can reliably answer questions about current live pricing data."},

{id:"m6q14",type:"single",q:"The course identifies 'function calling' as a capability where GPT models are rated 'Excellent' versus Claude's 'Good.' When is this difference practically significant for enterprise development teams?",
opts:["Always — function calling is the most important AI capability for any enterprise application regardless of specific feature requirements","When building API-heavy applications that rely extensively on structured outputs and automated tool invocation — the reliability and schema adherence of function calling matters most in deeply integrated automation pipelines","Only for gaming and entertainment applications where real-time function calls drive interactive experiences","Function calling is a developer convenience feature with no practical performance difference — the 'Excellent' versus 'Good' distinction is purely marketing terminology"],
correct:[1],cat:"analytical",
exp:"The course notes GPT's top strength as 'structured output, function calling, DALL-E integration' and 'best for API-heavy applications.' Function calling reliability matters when AI must invoke external tools, APIs, or structured data operations with high precision — where schema adherence and parameter accuracy affect downstream system behaviour. For primarily text-generation or reasoning tasks, this distinction is less significant."},

{id:"m6q15",type:"single",q:"The course's 'start cheap' principle says: 'Begin with a fast-cheap model. It's 10x cheaper and often good enough.' A team immediately starts with Claude Opus for all tasks. What risk does the course identify?",
opts:["Claude Opus may have higher latency than fast-cheap models, degrading user experience for real-time features requiring instant responses",
"Claude Opus has stricter content policies than fast-cheap models, blocking professional content that fast-cheap models would approve",
"The team is overpaying for capability they may not need — tasks that fast-cheap models handle adequately at 10x lower cost are consuming frontier model budget that could fund more AI features or higher task volumes",
"The team cannot downgrade from Opus once workflows are built around it, creating technical lock-in that prevents future cost optimisation"],
correct:[2],cat:"analytical",
exp:"The course's principle is economic and capability-matched: if a fast-cheap model achieves adequate quality for a task, using frontier wastes budget on capability beyond what the task requires. The risk is overinvestment without quality benefit — paying 10x for tasks where the quality difference is imperceptible. This misallocates AI budget that could fund higher task volumes or more sophisticated features where frontier capability is genuinely needed."},

{id:"m6q16",type:"single",q:"The course covers reasoning models as a premium option for hard problems. What specific characteristic of a task justifies the additional cost and 10-30 second latency?",
opts:["The task produces outputs that will be seen by senior executives — high-visibility outputs justify premium model investment regardless of reasoning complexity",
"The task has a word count above 1,000 words — longer outputs justify reasoning model investment because the model must plan a longer structure",
"Tasks that failed on standard models — reasoning models should be tried second when standard models produce poor quality, regardless of task type",
"The task genuinely benefits from the model arguing with itself across multiple reasoning paths — mathematical proofs, complex multi-step logic, genuinely ambiguous strategic problems where the exploration itself improves the conclusion"],
correct:[3],cat:"analytical",
exp:"The course asks: 'Will the model benefit from arguing with itself?' The answer is yes for: math and logic, multi-step planning, complex analysis, ambiguous problems, strategic reasoning. The answer is no for: writing, summarisation, classification, boilerplate code. The benefit comes from genuine multi-path reasoning exploration — not from output visibility, output length, or as a fallback when standard models fail on any task."},

{id:"m6q17",type:"single",q:"A startup uses Claude Sonnet as their sole AI model. Usage profile: 60% email classification, 30% report generation, 10% complex strategic analysis. What does the course's tiering framework suggest?",
opts:["The 60% email classification should move to fast-cheap (Haiku) tier — classification is explicitly in the fast-cheap category; Sonnet resources are then better allocated to the 30% and 10% where balanced capability is appropriate",
"This is optimal — balanced-tier models are the appropriate default for all three task types in a startup context",
"The 10% strategic analysis should move to frontier tier and all other tasks should remain on Sonnet — this is the minimum tier adjustment needed",
"All three categories should move to different tiers — classification to fast-cheap, reports to balanced, analysis to frontier — creating a three-tier model strategy"],
correct:[0],cat:"analytical",
exp:"The course's task matching table lists 'Classification, labeling' as 'Fast-Cheap' tier. 60% of this startup's usage on Sonnet for classification work represents significant overpayment relative to what Haiku achieves at equivalent quality. Moving classification to Haiku immediately reduces costs on 60% of volume. Report generation at balanced is correctly placed; the primary optimisation is the large-volume classification task."},

{id:"m6q18",type:"single",q:"The course describes the trade-off between closed models (GPT, Claude, Gemini) and open-source (Llama, Mistral). A healthcare company needs AI for processing patient records. What does the course's framework recommend?",
opts:["Any major closed model with enterprise data agreements — major providers have HIPAA-compliant offerings that satisfy healthcare data requirements","Evaluate open-source self-hosted options for patient record processing — data never leaves is the priority for patient data, making self-hosted open-source the architecturally safest default, with closed enterprise API as an alternative if appropriate agreements are available","The highest-capability closed model — patient records require the most accurate AI outputs, making capability the overriding selection criterion","Avoid AI entirely for patient records — healthcare data is categorically excluded from all enterprise AI tool terms of service"],
correct:[1],cat:"scenario",
exp:"The course identifies healthcare data as sensitive and lists 'Sensitive data, private infrastructure, compliance work, internal only' as the use case for self-hosted open-source. Patient records are the paradigmatic sensitive data case — data sovereignty is the primary requirement. Self-hosted open-source ensures data never leaves the organisation's infrastructure. Closed commercial APIs may be used with appropriate agreements, but the course's primary recommendation for sensitive data is self-hosting."},

{id:"m6q19",type:"single",q:"The course warns: 'Model capabilities evolve. A task that required frontier three months ago might work great on balanced now.' What workflow practice does this recommendation imply for AI product teams?",
opts:["Rebuild AI features from scratch every quarter using the latest model versions to ensure continuous optimisation",
"Lock in pricing agreements with providers at the start of each quarter to avoid cost changes from model updates",
"Periodically test current-tier models on task samples that previously required upgrading — model improvements may enable tier downgrades that reduce costs without quality loss",
"Maintain fixed model selection for at least 12 months to ensure stable, consistent product behaviour before evaluating changes"],
correct:[2],cat:"analytical",
