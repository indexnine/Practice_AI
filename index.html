<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Foundation — Practice Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0c14;--surface:#111420;--surface2:#161b2e;--surface3:#1c2340;
  --accent:#4f8eff;--accent2:#7b5ea7;--accent3:#00d4a0;
  --text:#e8eaf6;--text2:#9ca3c8;--text3:#5c6490;
  --border:#1e2545;--border2:#2a3260;
  --danger:#ff4d6d;--warn:#ffb830;--success:#00d4a0;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --r:12px;--r2:8px;--r3:20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;font-size:15px;line-height:1.6;}
h1,h2,h3,h4,h5{font-family:var(--fh);}
button{cursor:pointer;font-family:var(--fb);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.fade-in{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.landing{min-height:100vh;display:flex;flex-direction:column;}
.land-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);background:rgba(10,12,20,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
.land-logo{display:flex;align-items:center;gap:11px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-text h1{font-size:16px;font-weight:800;letter-spacing:-.2px;}
.logo-text span{font-size:10px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;}
.land-hero{padding:80px 40px 50px;text-align:center;position:relative;}
.land-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(79,142,255,.1) 0%,transparent 60%);pointer-events:none;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;background:rgba(79,142,255,.12);border:1px solid rgba(79,142,255,.25);border-radius:20px;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:22px;}
.hero-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.land-hero h2{font-size:clamp(28px,4vw,48px);font-weight:800;line-height:1.15;margin-bottom:16px;letter-spacing:-.5px;}
.land-hero h2 em{font-style:normal;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.land-hero p{color:var(--text2);font-size:16px;max-width:560px;margin:0 auto 42px;}
.land-body{padding:0 40px 60px;max-width:1200px;margin:0 auto;width:100%;}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;margin-bottom:14px;}
.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:32px;}
.mod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--mod-color,var(--accent));}
.mod-card:hover{border-color:var(--mod-color,var(--accent));transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3);}
.mod-num{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.mod-title{font-size:14px;font-weight:700;margin-bottom:6px;font-family:var(--fh);}
.mod-icon{font-size:24px;margin-bottom:10px;}
.mod-meta{font-size:11.5px;color:var(--text2);}
.all-card{background:linear-gradient(135deg,rgba(79,142,255,.15),rgba(123,94,167,.15));border:1px solid rgba(79,142,255,.3);border-radius:var(--r);padding:22px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:18px;}
.all-card:hover{border-color:rgba(79,142,255,.6);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3);}
.all-card-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.all-card-text h3{font-size:16px;font-weight:800;margin-bottom:4px;}
.all-card-text p{font-size:12px;color:var(--text2);}
.all-card-badge{margin-left:auto;background:var(--accent);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.quiz-page{min-height:100vh;background:#f8f9fc;color:#1a1d2e;display:flex;flex-direction:column;}
.quiz-topbar{background:#fff;border-bottom:1px solid #e2e6f0;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.quiz-topbar-left{display:flex;align-items:center;gap:14px;}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid #dee2ef;border-radius:8px;background:#fff;color:#4a5270;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;}
.back-btn:hover{background:#f0f2f9;border-color:#c0c8e0;}
.quiz-title-block h2{font-size:15px;font-weight:800;color:#1a1d2e;font-family:var(--fh);}
.quiz-title-block p{font-size:11.5px;color:#6b7280;}
.timer-block{display:flex;align-items:center;gap:8px;background:#f0f2f9;border:1px solid #dee2ef;border-radius:8px;padding:8px 16px;text-align:center;}
.timer-val{font-family:var(--fh);font-size:19px;font-weight:800;color:#1a1d2e;letter-spacing:.5px;}
.timer-lbl{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;}
.prog-bar{height:4px;background:#e2e6f0;}
.prog-fill{height:4px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .3s ease;}
.quiz-body{flex:1;padding:32px 24px;max-width:820px;margin:0 auto;width:100%;}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.filter-lbl{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.7px;margin-right:4px;}
.filter-btn{padding:6px 15px;border-radius:20px;border:1.5px solid #dee2ef;background:#fff;color:#4a5270;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.q-card{background:#fff;border:1px solid #e2e6f0;border-radius:14px;padding:26px 28px;margin-bottom:22px;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.q-num{font-size:10.5px;color:#9ca3af;text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.q-cat-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;text-transform:capitalize;}
.cat-recall{background:#eff6ff;color:#2563eb;}
.cat-scenario{background:#f0fdf4;color:#16a34a;}
.cat-analytical{background:#fdf4ff;color:#9333ea;}
.q-text{font-size:16px;font-weight:700;color:#1a1d2e;line-height:1.5;margin-bottom:20px;font-family:var(--fh);}
.multi-note{font-size:11.5px;color:#9ca3af;margin-bottom:12px;font-style:italic;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:#f8f9fc;border:1.5px solid #e2e6f0;border-radius:10px;cursor:pointer;transition:all .14s;user-select:none;}
.opt:hover:not(.disabled){border-color:#93a8e8;background:#eef1fb;}
.opt.sel{border-color:var(--accent);background:rgba(79,142,255,.08);}
.opt.cor{border-color:#16a34a!important;background:rgba(22,163,74,.1)!important;}
.opt.wrg{border-color:#dc2626!important;background:rgba(220,38,38,.08)!important;}
.opt.disabled{cursor:default;}
.omark{width:20px;height:20px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.sq{border-radius:5px;border:2px solid #cbd5e1;}
.rd{border-radius:50%;border:2px solid #cbd5e1;}
.checked-sq{border-radius:5px;background:var(--accent);border:2px solid var(--accent);color:#fff;}
.checked-rd{border-radius:50%;background:var(--accent);border:2px solid var(--accent);color:#fff;}
.cor-icon{background:#16a34a;border:2px solid #16a34a;border-radius:50%;color:#fff;}
.wrg-icon{background:#dc2626;border:2px solid #dc2626;border-radius:50%;color:#fff;}
.otext{font-size:13.5px;color:#374151;line-height:1.5;}
.feedback-box{margin-top:18px;padding:16px 18px;border-radius:10px;font-size:13px;line-height:1.6;}
.fb-correct{background:#f0fdf4;border:1px solid #bbf7d0;}
.fb-incorrect{background:#fff1f2;border:1px solid #fecdd3;}
.fb-header{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:8px;font-family:var(--fh);}
.fb-correct .fb-header{color:#15803d;}
.fb-incorrect .fb-header{color:#b91c1c;}
.fb-exp{color:#374151;}
.fb-correct-ans{margin-top:8px;font-weight:600;color:#15803d;font-size:12.5px;}
.action-row{display:flex;align-items:center;justify-content:space-between;margin-top:24px;}
.btn-submit{padding:11px 24px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:all .14s;font-family:var(--fh);}
.btn-submit:hover{background:#3a7aed;}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
.btn-next{padding:11px 24px;background:#1a1d2e;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:all .14s;font-family:var(--fh);}
.btn-next:hover{background:#111420;}
.q-progress{font-size:13px;color:#6b7280;}
.empty-filter{text-align:center;padding:60px 20px;color:#6b7280;}
.results-page{min-height:100vh;background:#f8f9fc;color:#1a1d2e;}
.results-topbar{background:#fff;border-bottom:1px solid #e2e6f0;padding:14px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.results-body{max-width:860px;margin:0 auto;padding:36px 24px;}
.score-hero{background:#fff;border:1px solid #e2e6f0;border-radius:16px;padding:36px;text-align:center;margin-bottom:28px;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.score-ring-wrap{position:relative;width:140px;height:140px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;}
.score-ring-svg{position:absolute;top:0;left:0;}
.score-inner{position:relative;z-index:1;text-align:center;}
.score-pct{font-family:var(--fh);font-size:34px;font-weight:800;}
.score-sub-lbl{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;}
.score-text{font-family:var(--fh);font-size:22px;font-weight:800;margin-bottom:6px;}
.score-sub{color:#6b7280;font-size:14px;margin-bottom:20px;}
.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-retake{padding:11px 24px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fh);}
.btn-retake:hover{background:#3a7aed;}
.btn-back-home{padding:11px 24px;background:#fff;color:#1a1d2e;border:1.5px solid #dee2ef;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fh);}
.btn-back-home:hover{background:#f0f2f9;}
.review-section{margin-top:8px;}
.review-section h3{font-family:var(--fh);font-size:17px;font-weight:800;margin-bottom:18px;color:#1a1d2e;}
.review-q{background:#fff;border:1px solid #e2e6f0;border-radius:12px;padding:20px 22px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.rq-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.rq-status{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;}
.rq-cor{background:#dcfce7;color:#15803d;}
.rq-wrg{background:#fee2e2;color:#b91c1c;}
.rq-skip{background:#f3f4f6;color:#9ca3af;}
.rq-text{font-size:14px;font-weight:700;color:#1a1d2e;line-height:1.5;font-family:var(--fh);}
.rq-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.ro{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:8px;font-size:12.5px;}
.ro-cor{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.ro-wrg{background:#fff1f2;border:1px solid #fecdd3;color:#b91c1c;}
.ro-neu{background:#f8f9fc;border:1px solid #e2e6f0;color:#6b7280;}
.ro-icon{font-size:11px;margin-top:1px;flex-shrink:0;}
.rq-exp{font-size:12.5px;color:#4b5563;background:#f8f9fc;border:1px solid #e2e6f0;border-radius:8px;padding:12px 14px;line-height:1.6;}
.review-group-hdr{font-family:var(--fh);font-size:14px;font-weight:700;padding:10px 0 8px;margin-top:20px;border-bottom:2px solid;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
</style>
</head>
<body>
<div id="root"></div>
<script>

const MODULE_META=[
{id:1,title:"What is AI?",icon:"🤖",color:"#4f8eff"},
{id:2,title:"Prompting",icon:"💬",color:"#7b5ea7"},
{id:3,title:"Hallucinations",icon:"👁",color:"#f59e0b"},
{id:4,title:"AI at Work",icon:"🏢",color:"#10b981"},
{id:5,title:"Tokens & Pricing",icon:"💰",color:"#06b6d4"},
{id:6,title:"Choosing Models",icon:"🎯",color:"#8b5cf6"},
{id:7,title:"AI Agents",icon:"🩾",color:"#ec4899"},
{id:8,title:"How AI Works",icon:"⚙",color:"#f97316"},
];
const MQ={
1:[
{id:"m1q1",type:"single",q:"The AI umbrella includes spam filters, recommendation engines, and large language models. What single property places all three under the label 'AI'?",
opts:["All three enable machines to perform tasks that previously required human perception or judgment",
"All three require internet connectivity to retrieve and process answers from live online databases",
"All three were created after 2022 and rely on the same transformer neural network architecture",
"All three generate new text or images rather than classifying or predicting from existing categories"],
correct:[0],cat:"recall",
exp:"AI is defined by enabling machines to do things that previously needed human cognition — perceiving, classifying, generating, deciding. Spam filters classify, recommenders predict preferences, LLMs generate language. Internet access, architecture type, and the generative vs. discriminative distinction are separate dimensions that do not unify all three under one label."},

{id:"m1q2",type:"single",q:"A recruiter uses an AI tool trained on historical hiring decisions to shortlist CVs. Finalists skew heavily toward candidates from elite universities. What AI failure mode best explains this pattern?",
opts:["The model overfit to training data and cannot generalise to candidates from any new university correctly","The model learned and replicated historical bias embedded in the training data, reproducing past discriminatory patterns at scale","The model underfit because historical hiring data is too sparse and noisy for AI classification to handle","The model hallucinated candidate qualifications since it lacked access to verified academic records"],
correct:[1],cat:"analytical",
exp:"When AI trains on historical decisions made by biased humans, it learns those biases as valid signal. The model isn't broken — it's doing exactly what it was trained to do: predict outcomes matching historical data. At scale this reproduces and amplifies past discrimination. Overfitting is a training accuracy gap, not a bias issue; hallucination means fabricating facts, not reproducing patterns."},

{id:"m1q3",type:"single",q:"ChatGPT reached 100 million users in two months after its November 2022 launch. What was the core innovation that made AI suddenly accessible to non-technical users for the first time?",
opts:["A massive increase in model parameters from millions to billions, enabling dramatically more accurate and comprehensive answers",
"Open-source licensing meant all AI tools became free to use without registration or subscription barriers",
"Natural language became the interface — anyone could interact with AI simply by typing questions in plain English",
"The model gained real-time internet access, enabling it to answer current-events questions reliably"],
correct:[2],cat:"recall",
exp:"Before ChatGPT, using AI required coding knowledge, API familiarity, or specialist training. The breakthrough was the chat interface: natural language as the universal access mechanism. This collapsed the technical barrier. Parameter count improvements, open-source licensing, and internet connectivity are each separate developments — none of them alone explains the accessibility shift the course describes."},

{id:"m1q4",type:"single",q:"A company describes its AI as having 'read millions of documents and understood every one of them.' What is the most accurate correction to this characterisation?",
opts:["The claim is accurate — LLMs do comprehend documents the way a human expert would after studying them",
"The model compressed all documents into a database it can search during each query, which is similar to but faster than human reading",
"The claim overstates volume — current LLMs train on thousands of documents, not millions",
"The model learned statistical patterns in text that allow it to predict likely next tokens — it has no comprehension, goals, or understanding in any human sense"],
correct:[3],cat:"analytical",
exp:"LLMs are statistical pattern engines: they learn which sequences of tokens tend to follow which others across vast training data. This produces outputs that look like comprehension without any semantic understanding, intent, or consciousness. The course calls this the intern mental model — very well-read, but not actually understanding. The quantity claim and database-search framing are also both inaccurate."},

{id:"m1q5",type:"single",q:"Which task would AI most reliably accelerate for an HR manager, based on the course's assessment of what AI is genuinely good at today?",
opts:["Drafting the initial job description from a role brief, to be reviewed and edited by the HR manager",
"Making the final hiring decision on which candidate best fits the team's interpersonal dynamics",
"Determining whether a candidate's salary expectations are culturally appropriate for this specific team",
"Predicting which current employees are at highest risk of resigning in the next 90 days with precision"],
correct:[0],cat:"scenario",
exp:"The course identifies drafting, summarising, and first-draft generation as core AI strengths. Drafting a JD from a brief is a well-defined generative task with human review following. Final hiring decisions require interpersonal judgment; salary cultural norms require local and relational context; attrition prediction requires verified data pipelines — these are in the course's risky or cannot-do categories."},

{id:"m1q6",type:"single",q:"What does the course mean when it warns: 'AI does not equal AGI'?",
opts:["AI tools are not yet intelligent and cannot perform any useful tasks without heavy human supervision at every step","Today's AI excels at language patterns but has no goals, consciousness, or general reasoning — it is a powerful pattern engine, not a general intelligence","AGI already exists but is classified as a national security secret and is not available to the public","All current AI products will become AGI within two to three years as model capabilities continue scaling"],
correct:[1],cat:"recall",
exp:"The course makes this distinction explicit in Modules 1 and 8: current AI is exceptional at language patterns but does not possess goals, consciousness, or general reasoning ability. It is a statistical pattern engine — extraordinary in scope but fundamentally different from general intelligence. AGI is a hypothetical future milestone, not a present reality or a near-term inevitability."},

{id:"m1q7",type:"single",q:"A data analyst says: 'I tried AI and it was not useful.' A colleague says: 'AI saves me two hours a day.' They use the same tool on similar analytical tasks. What does the course identify as the most likely explanation for this gap?",
opts:["The second colleague has access to a more expensive subscription tier with a better underlying model",
"The first analyst's tasks involve real-time data which AI cannot access, making it unsuitable for their role",
"Prompt quality is almost always the gap — structured, specific prompts reliably produce far better outputs than vague ones",
"The second colleague has a computer science background, making AI tools inherently more useful for technical users"],
correct:[2],cat:"scenario",
exp:"The course states directly: 'The gap between I tried AI and it wasn't useful and AI saves me 2 hours a day is almost always prompt quality.' Subscription tier, task type, and technical background are secondary factors. Prompt structure is the lever most within the user's control, and the course's core message is that learning to prompt is the highest-ROI skill for any role."},

{id:"m1q8",type:"single",q:"The course describes AI as 'a very fast, very well-read intern.' Which limitation of this intern is most critical to remember when using AI for client-facing deliverables?",
opts:["The intern works extremely slowly on complex tasks and requires days to produce research outputs",
"The intern can only communicate in English and cannot assist with multilingual or international client work",
"The intern requires a detailed job description before starting any task and cannot handle open-ended requests",
"The intern can confidently state wrong information and does not know when it is wrong — all outputs require fact-checking"],
correct:[3],cat:"analytical",
exp:"The course's intern analogy specifically highlights two limitations: the intern does not actually understand, and it can confidently say wrong things. For client-facing work the critical implication is that AI outputs always require verification — the model has no mechanism to know when it is wrong. Speed, language capability, and need for instruction are less critical concerns than confident incorrectness."},

{id:"m1q9",type:"single",q:"Generative AI differs from traditional AI in a specific way the course describes. Which statement correctly captures this distinction?",
opts:["Traditional AI classifies or predicts from existing categories; generative AI creates new content by predicting what could come next",
"Traditional AI requires cloud servers; generative AI runs locally on any device without internet connectivity",
"Traditional AI is built by large companies; generative AI can be built by individual developers without training data",
"Traditional AI uses neural networks; generative AI uses rule-based systems that do not require any training data"],
correct:[0],cat:"recall",
exp:"The course draws this distinction explicitly: traditional AI answers 'what is this?' through classification or prediction. Generative AI answers 'what could come next?' by creating new text, images, or code. Both typically use neural networks; both require training data; both can be cloud or local. The generative versus discriminative distinction is about output type, not architecture or developer scale."},

{id:"m1q10",type:"single",q:"Why does the course place 'medical and legal advice' in the 'risky' category rather than the 'great at' category for AI?",
opts:["AI models are not trained on medical or legal text and therefore have no domain knowledge in these areas","These domains require ground truth accuracy and accountability — AI can generate plausible-sounding but incorrect guidance with no mechanism to signal its own errors","Medical and legal questions are too short for AI to provide useful responses within context window limits","AI providers contractually prohibit use of their tools for medical and legal purposes in their standard terms of service"],
correct:[1],cat:"analytical",
exp:"The course categorises medical and legal advice as risky because they require factual accuracy — not statistical plausibility — and carry real-world consequences if wrong. AI can produce confident, professional-sounding guidance that is factually incorrect. The absence of an error-detection mechanism combined with high stakes is what makes these risky, not a training data gap or contractual restriction."},

{id:"m1q11",type:"single",q:"According to the course, what happened between 2017 and 2022 that set the stage for the ChatGPT breakthrough?",
opts:["AI researchers solved the problem of hallucination, making models reliable enough for public use for the first time",
"All major tech companies agreed to open-source their AI models, creating a shared research base accessible to all",
"The transformer architecture was introduced in 2017, enabling faster training — GPT-3 then demonstrated few-shot learning at 175B parameters in 2020, establishing the capability foundation",
"Government funding of AI research increased tenfold, creating the computational resources needed for large model training"],
correct:[2],cat:"recall",
exp:"The course timeline shows: 2017 — transformer architecture introduced; 2020 — GPT-3 at 175B parameters shocked the field with few-shot learning; 2022 — ChatGPT demonstrated the natural language interface. These three steps built on each other. Hallucination was not solved; open-sourcing was not a prerequisite; government funding was not the primary driver."},

{id:"m1q12",type:"single",q:"The course states AI 'cannot access your systems' or 'remember past conversations' as default limitations. What mechanism do chat UIs use to work around the memory limitation?",
opts:["Chat UIs store user preferences in cookies that persist between sessions and load them into the model automatically",
"Chat UIs use a separate memory model that summarises all past conversations and retrieves relevant summaries per request",
"Chat UIs maintain a direct persistent connection to the model that allows it to retain state across sessions",
"Chat UIs re-send the full conversation history with every new message, creating the appearance of memory within the context window"],
correct:[3],cat:"analytical",
exp:"The course explains in Module 8 that each inference call is stateless — the model only sees what is in the current context window. Chat UIs fake memory by re-sending the conversation history as part of each new message. When history exceeds the context window, the oldest messages are dropped. There is no persistent state, no separate memory model, and no persistent connection — all memory is context-window content."},

{id:"m1q13",type:"single",q:"What does the course mean when it identifies 'emergent abilities' as a defining feature of how modern AI differs from traditional rule-based systems?",
opts:["Abilities like translation and code generation were never explicitly programmed — they arose as side effects of training the model to predict text well enough at scale",
"Emergent abilities means developers intentionally program hidden capabilities that activate at certain scale thresholds",
"Emergent abilities refers to AI systems that improve continuously during deployment by learning from user interactions",
"Emergent abilities are only present in the largest frontier models and are absent from all smaller, cheaper models"],
correct:[0],cat:"recall",
exp:"The course states in Module 8: 'No one programmed the model to translate French or write Python. It learned these as side effects of predicting text well enough at scale.' Emergent abilities are capabilities that were not explicitly trained for — they arose from statistical pattern learning at sufficient scale. This is distinct from intentional programming, continuous learning, or size-gated features."},

{id:"m1q14",type:"single",q:"A product team argues: 'We should use AI for everything — it is always faster.' What does the course's framework suggest about this position?",
opts:["The position is correct — AI accelerates all tasks and the only question is which model tier to deploy","The position is overstated — AI slows you down on tasks requiring relationship context, live information, nuanced emotional messaging, and decisions requiring accountability","The position is correct for technical tasks but overstated for creative work where human judgment still dominates","The position would be correct if the team invests in learning advanced prompting techniques for complex tasks"],
correct:[1],cat:"analytical",
exp:"The course's Module 4 three-question filter and explicit 'AI slows you down' list both contradict blanket use. Relationship-heavy work, nuanced emotional messaging, real-time information, and tasks requiring accountability are all cases where AI adds friction rather than speed. The course recommends applying the three-question filter before defaulting to AI."},

{id:"m1q15",type:"single",q:"How does the course define the shift that occurred after 2022 for professionals in non-technical roles?",
opts:["AI became mandatory for all knowledge workers, replacing existing tools like spreadsheets and email clients",
"Most non-technical roles were automated, creating demand for re-skilling into AI engineering positions",
"Natural language as the interface meant that using AI no longer required coding, APIs, or specialist expertise — every role became an AI role",
"AI costs fell below ten dollars per month, making it economically accessible to individual professionals for the first time"],
correct:[2],cat:"recall",
exp:"The course states: 'Natural language is the superpower. You don't need to learn APIs, code, or frameworks. You just ask. This is why everyone is now an AI person — the barrier to entry collapsed.' The shift was an interface shift, not an automation wave or a cost threshold. Non-technical roles were not replaced; they gained direct access to AI capability through the chat interface."},

{id:"m1q16",type:"single",q:"A manager asks their team to use AI to 'browse competitors' websites and pull live pricing data.' Based on the course, why is this expectation likely to fail?",
opts:["AI models are legally prohibited from accessing competitor websites due to copyright and scraping restrictions",
"AI can browse websites but only returns results if the website has been indexed in the AI provider's search database",
"AI web browsing requires a paid enterprise subscription and is not available on standard consumer accounts",
"By default, AI cannot browse the web or access external systems — it can only work with information in the prompt or its training data"],
correct:[3],cat:"scenario",
exp:"The course lists 'access your systems' and 'browse the web' explicitly in the cannot-do category for default AI tools — though it notes this is 'possible with tools.' Web-enabled models like Perplexity exist, but base LLM APIs do not browse the internet by default. The manager is assuming web access that does not exist without tool integration. This is a foundational limitation, not a legal or subscription issue."},

{id:"m1q17",type:"single",q:"What is the 'hallucination risk' that Module 1 introduces before explaining it in full detail in Module 3?",
opts:["AI will confidently generate plausible-sounding false information — it does not know it is wrong and always requires fact-checking",
"Hallucination is when AI visually renders incorrect images that look realistic but depict events that never occurred",
"Hallucination is when AI repeats the same response multiple times due to a context window overflow error",
"Hallucination refers to AI responses that are technically accurate but written in a confusing or misleading style"],
correct:[0],cat:"recall",
exp:"Module 1 introduces hallucination with this exact framing: 'AI will confidently generate plausible-sounding false information. It doesn't know it's wrong. Always verify facts, numbers, and claims — especially in high-stakes contexts.' The key characteristics are: confident, plausible-sounding, false, and self-unaware. This is not a visual rendering issue, a repetition error, or a style problem."},

{id:"m1q18",type:"single",q:"The course describes 2024 as the year of the 'open-source boom.' What strategic advantage does this give to organisations handling sensitive data?",
opts:["Open-source models produce higher quality outputs than commercial models because they are trained on more diverse data","Open-source models can be self-hosted, meaning data never leaves the organisation's own infrastructure — eliminating external API exposure for sensitive information","Open-source models are free to use, eliminating all AI costs for organisations that choose self-hosting over commercial APIs","Open-source models can be used without attribution requirements, allowing organisations to white-label AI products freely"],
correct:[1],cat:"analytical",
exp:"The course's Module 6 covers this directly: open-source models like Llama and Mistral are 'self-hostable, no API costs at scale' and are the right choice when data cannot leave the organisation's infrastructure. Data sovereignty — not quality, cost alone, or licensing terms — is the primary strategic driver for sensitive data use cases."},

{id:"m1q19",type:"single",q:"According to the course, what does it mean practically that AI has 'no memory of past conversations' by default?",
opts:["AI cannot learn from user corrections during a session and will repeat the same mistakes throughout the entire conversation",
"AI automatically deletes all conversation logs after each session for privacy protection, making retrieval impossible",
"Each new conversation starts from scratch — the model has no access to what was discussed in previous sessions unless that content is explicitly included in the current prompt",
"AI cannot maintain context within a single conversation and treats each message as independent of all prior messages"],
correct:[2],cat:"recall",
exp:"The course distinguishes within-session context (history re-sent in each message, creating apparent within-session memory) from cross-session memory (absent by default). The practical implication: a new conversation starts completely blank. Previous sessions, context, preferences, or corrections are inaccessible unless the user explicitly re-provides them. Within a single session, the chat UI maintains apparent continuity via history re-sending."},

{id:"m1q20",type:"single",q:"A team lead tells a junior employee: 'Just prompt AI exactly the way you would ask a colleague.' The course suggests this mental model will lead to suboptimal results. Why?",
opts:["AI requires formal business English rather than conversational language to produce professional-quality outputs",
"AI is more responsive to commands than questions, so requests should be phrased as direct imperatives without explanation",
"Colleagues can ask for clarification when requests are ambiguous, but AI will always produce an output regardless, making all vague requests dangerous",
"Colleagues have context, memory, and judgment — AI has none of these by default, so casual open-ended requests produce vague outputs; explicit role, task, context, format, and constraints are required"],
correct:[3],cat:"analytical",
exp:"The colleague analogy fails because colleagues bring shared context, memory of previous work, and judgment about what you actually want. AI has none of these by default. The course's CRAFT framework exists precisely because AI needs explicit specification of everything a colleague would infer. While the inability to ask for clarification has some validity, the primary gap is the absence of shared context and memory."},
],
2:[
{id:"m2q1",type:"single",q:"The course describes prompts as 'specifications' and states 'vague in, vague out.' A marketing manager sends: 'Write something for the product launch.' What is the single most important missing element?",
opts:["No role, task detail, audience, format, or constraints are specified — the AI has no precise pattern to complete",
"The prompt is missing a polite tone instruction — AI produces better outputs when prompted more respectfully",
"The prompt is too short — AI models require a minimum word count to activate their full reasoning capability",
"The prompt lacks an example of a previous product launch communication to guide the model's style"],
correct:[0],cat:"analytical",
exp:"The course's CRAFT framework identifies five elements: Role, Task, Context, Format, and Constraints. 'Write something for the product launch' specifies none of these. A few-shot example would help but is secondary — the fundamental problem is complete specification absence, leaving the AI to guess across all dimensions simultaneously."},

{id:"m2q2",type:"single",q:"The CRAFT framework has five elements. Which is most often omitted and has the highest impact on whether AI output is directly usable without reformatting?",
opts:["Role — omitting the persona means the model defaults to a generic assistant voice that rarely matches professional requirements","Format — without a specified output structure, AI produces prose that requires manual reformatting before it is usable in any workflow","Context — without background, AI defaults to generic assumptions that are rarely accurate for the specific situation","Terms — omitting word limits and style rules produces outputs that are too long or in the wrong tone"],
correct:[1],cat:"analytical",
exp:"The course identifies format as the most impactful missing element because without it AI produces free-form prose that must be manually restructured before use. Specifying JSON, markdown table, numbered list, or a specific heading structure produces output that can be directly inserted into a workflow. Format determines whether the output is directly usable or requires significant rework."},

{id:"m2q3",type:"single",q:"A developer uses zero-shot prompting to classify customer emails into five categories. Results are inconsistent. The course recommends a specific technique that would most directly fix this. What is it?",
opts:["Chain-of-thought prompting — asking the model to explain its reasoning before classifying will improve category accuracy",
"Upgrading to a frontier model — classification inconsistency is always caused by insufficient model capability",
"Few-shot prompting — providing 2-3 labelled examples of each category shows the model the exact pattern it should reproduce",
"Role prompting — assigning the model the role of expert email classifier will activate specialised classification behaviour"],
correct:[2],cat:"scenario",
exp:"The course states explicitly: 'Few-shot is underrated. Adding 2-3 concrete examples is usually faster and more reliable than detailed instructions.' For classification with specific categories, showing labelled examples of each category is the fastest way to establish the exact pattern. Chain-of-thought adds reasoning overhead not needed for classification; model upgrade and role prompting are secondary levers."},

{id:"m2q4",type:"single",q:"What is the TRACE method introduced in Module 2, and what problem does it solve?",
opts:["TRACE is a security audit method for identifying prompt injection vulnerabilities in production AI systems",
"TRACE is a team workflow for tracking which prompts have been tested, approved, and added to the shared library",
"TRACE is a cost optimisation method for reducing token usage by trimming redundant content from long prompts",
"TRACE is an iterative debugging loop — Test, Revise, Add examples, Constrain, Evaluate — that structures how to improve a prompt that is not producing acceptable output"],
correct:[3],cat:"recall",
exp:"The course introduces TRACE in Module 2's iterative prompting lesson: Test (run the prompt), Revise (identify what went wrong), Add examples (show the pattern), Constrain (tighten the solution space), Evaluate (loop or ship). It solves the problem of treating prompting as a one-shot task rather than an iterative feedback loop."},

{id:"m2q5",type:"single",q:"A product analyst generates a report using AI. Output is 80% correct — structure, tone, and most content are right, but two sections have wrong figures. The course's 80% rule recommends what action?",
opts:["Edit the prompt to fix the specific sections producing wrong figures rather than regenerating — this preserves what is correct and targets only the gap",
"Regenerate the entire report from scratch using a more specific prompt to avoid the risk that other sections are also incorrect",
"Switch to a frontier model which will produce 100% accurate outputs and eliminate the need for revision",
"Accept the 80% output as sufficient and manually correct the two sections directly in the report"],
correct:[0],cat:"scenario",
exp:"The course states: 'If output is 80% correct, edit the prompt to fix the 20% rather than regenerating. This is faster and keeps good parts intact.' Regenerating risks losing what already works. Switching models is a last resort. Manual correction is acceptable but the course recommends fixing the prompt so future generations also produce correct output."},

{id:"m2q6",type:"single",q:"A system prompt for a customer support bot reads: 'You are a friendly support agent. Never discuss competitor products. Always escalate billing issues to a human. Use simple language.' What does the system prompt accomplish that a user prompt cannot?",
opts:["The system prompt trains the model on the company's specific product knowledge for the duration of the session","The system prompt establishes persistent behavioural rules that apply to every user message — enforcing consistent persona, constraints, and escalation logic regardless of what users ask","The system prompt gives the model administrative access to the company's billing and customer databases","The system prompt encrypts the conversation so customer PII shared during support cannot be logged"],
correct:[1],cat:"recall",
exp:"The course describes the system prompt as 'always-on instructions above the conversation' that set role, tone, guardrails, and domain rules applying to every message. The user prompt delivers the specific per-turn request. The system prompt enforces consistency across all user inputs. It does not train the model, grant database access, or handle encryption."},

{id:"m2q7",type:"single",q:"The course identifies a specific technique as 'the one most people skip.' What is it, and why does the course highlight it?",
opts:["Chain-of-thought — most users ask for direct answers without realising that step-by-step reasoning dramatically improves accuracy",
"Role prompting — most users forget to assign a professional persona, defaulting to generic assistant outputs",
"Few-shot examples — most users write detailed instructions when 2-3 concrete examples are faster and more reliable for establishing output patterns",
"System prompts — most users interact only through user messages, missing the persistent behavioural layer system prompts provide"],
correct:[2],cat:"recall",
exp:"The course states under Strategy 3: 'The one most people skip: few-shot. Adding 2-3 examples often beats a paragraph of instructions.' Users tend to write longer instruction paragraphs when the model does not behave as expected. But examples show the pattern concretely rather than describing it abstractly — and concrete beats descriptive for establishing output format and style."},

{id:"m2q8",type:"single",q:"An operations team builds a prompt library for recurring tasks. According to the course, what is the primary productivity benefit of this practice?",
opts:["A prompt library allows the team to bypass the AI provider's rate limits by caching pre-approved responses offline",
"A prompt library enables the AI model to learn the team's preferences over time, improving output quality with each use",
"Prompts stored in a library are automatically optimised by the AI provider for cost efficiency",
"Curated, tested prompts for recurring tasks eliminate the need to re-prompt from scratch each time, creating reusable templates that compound efficiency across the team"],
correct:[3],cat:"recall",
exp:"The course recommends building a personal prompt library specifically because recurring tasks benefit from proven, tested prompts that do not need to be rebuilt each time. This compounds: a prompt that saves five minutes per use saves five hours across sixty uses. Prompt libraries do not interact with rate limits, do not enable model learning, and are not optimised by providers."},

{id:"m2q9",type:"single",q:"When should a professional choose chain-of-thought prompting over zero-shot prompting, according to the course?",
opts:["For tasks involving multi-step logic, math, or complex reasoning where intermediate steps matter — zero-shot is fine for simple, well-defined tasks",
"Always — chain-of-thought produces better quality outputs for every task type with no downside",
"Only when the AI gives a wrong answer on the first attempt — chain-of-thought is a debugging technique, not a primary strategy",
"Chain-of-thought is only needed when output will be reviewed by a senior colleague who needs to see the reasoning"],
correct:[0],cat:"recall",
exp:"The course's strategy selector is explicit: chain-of-thought applies to complex reasoning tasks. The course also notes zero-shot works for simple, well-defined tasks. Chain-of-thought adds overhead (token cost, latency) justified only when intermediate reasoning steps genuinely improve accuracy — which is the case for multi-step logic, math, and complex analysis, not for writing, classification, or simple Q&A."},

{id:"m2q10",type:"single",q:"A team lead notices the AI follows 6 of 10 explicit instructions consistently. The course attributes this to a named phenomenon. What is it and what is the recommended fix?",
opts:["Model drift — the model's behaviour changes over time and needs periodic retraining to restore instruction compliance","Instruction dilution — attention distributes across all instructions and later or lower-priority ones tend to be under-followed; fix by prioritising critical instructions prominently and testing each individually","Prompt injection — malicious content in the input is overriding some instructions with competing directives from external sources","Token overflow — prompts exceeding 512 tokens lose some instructions due to context window truncation"],
correct:[1],cat:"analytical",
exp:"The course covers instruction dilution: when instruction lists are long, models distribute attention and consistently follow a subset. Instructions buried in the middle are at highest risk. The fix is to prioritise critical instructions, place them prominently, use clear formatting to separate key constraints, and test each instruction's compliance in isolation before combining them."},

{id:"m2q11",type:"single",q:"The course's prompt pattern library includes eight patterns. Which pattern is most appropriate for pulling structured data from an unstructured customer feedback paragraph?",
opts:["Summarize — condense the feedback into bullet points capturing the key sentiment and topics mentioned",
"Compare — identify differences between this feedback and a template of expected customer responses",
"Extract — pull specified entities such as product names, sentiment, and action requests from text and return as structured output",
"Critique — evaluate the feedback for clarity and suggest how the customer could have expressed concerns more specifically"],
correct:[2],cat:"scenario",
exp:"The course defines Extract as: 'pull structured data from text' with starter 'Extract emails, names, dates from this text and return as JSON.' This is precisely the pattern for converting unstructured text into specified structured fields. Summarize produces condensed prose, not structured fields. Compare requires two inputs. Critique evaluates quality rather than extracting data."},

{id:"m2q12",type:"single",q:"A legal team asks AI to draft a non-disclosure agreement and receives a generic template with no firm names, jurisdiction, or specific obligation terms. What prompt engineering fix most directly addresses this?",
opts:["Switch from zero-shot to chain-of-thought and ask the model to reason through each clause before drafting",
"Use a larger frontier model which will infer the necessary details from the phrase 'NDA' without explicit specification",
"Add a role instruction: 'You are a senior legal partner' to activate the model's legal knowledge and improve specificity",
"Add explicit context — jurisdiction, parties, nature of confidential information, obligations, term length — and a worked example of an acceptable clause"],
correct:[3],cat:"scenario",
exp:"Generic output on a specific legal task is a context problem. The model received 'draft an NDA' with no specifications, so it produced a maximally generic template. Adding the specific context — English law, two named parties, software IP confidentiality, 3-year term — grounds the output in the actual situation. While role prompting helps with tone, the primary fix is context: giving the model the information it cannot infer."},

{id:"m2q13",type:"single",q:"The course's 'Chain' pattern is described as 'break tasks into steps, one feeds the next.' How does this improve output quality compared to asking for the same output in a single request?",
opts:["Each step can be validated before the next begins — errors are caught early and corrected rather than propagating through a multi-step task into the final output",
"Chaining tasks reduces total token usage because each step produces a shorter output than a single large request",
"Chained prompts automatically route different steps to the most cost-efficient model tier without manual intervention",
"Chaining prevents hallucination by ensuring the model only generates factual content at each pipeline step"],
correct:[0],cat:"analytical",
exp:"The course's multi-step pipeline example shows: Classify then Draft then Human Review then Send. The key advantage is validation at each step: if classification is wrong, drafting does not proceed on a wrong premise. This is the course's rationale for chaining over one-shot requests — not token savings, not automatic routing, and not hallucination prevention which is a separate concern."},

{id:"m2q14",type:"single",q:"What does the course mean by 'the model always tries to complete your pattern'?",
opts:["AI models search their training data for the most statistically similar previous question and reproduce that answer","The model continues the statistical pattern established by your prompt — a clear, specific pattern produces a predictable useful continuation; a vague pattern produces a vague continuation","AI models are programmed to always produce an output even when the question is unanswerable, completing the pattern by fabricating a response","Pattern completion means the model matches your prompt's structure exactly, replicating formatting, length, and style regardless of content quality"],
correct:[1],cat:"recall",
exp:"The course's core mental model for prompting: 'Models complete patterns, not read minds. Clear patterns = predictable, useful results. Fuzzy patterns = fuzzy results.' The model processes the prompt as a statistical pattern and generates a continuation that matches it. A specific detailed prompt creates a narrow pattern with a limited useful completion space; a vague prompt creates a wide pattern with many possible completions."},

{id:"m2q15",type:"single",q:"A finance team adds to their AI tool's system prompt: 'Never provide specific investment recommendations. Always recommend consulting a certified financial advisor.' Why is this placed in the system prompt rather than repeated in each user prompt?",
opts:["System prompts are processed more quickly than user prompts, making the model respond faster when constraints are in the system prompt",
"System prompts are visible only to developers, keeping the constraint hidden from users who might attempt to bypass it",
"The system prompt enforces this constraint on every user interaction automatically — it cannot be overridden by user messages and does not need to be repeated",
"User prompts have a character limit that would be consumed by including this constraint, leaving insufficient space for the actual question"],
correct:[2],cat:"analytical",
exp:"The course describes the system prompt as 'always-on instructions' that apply to every message. Placing a guardrail in the system prompt means it is consistently enforced without requiring every user to include it. The course describes system prompts as establishing guardrails — 'what to never do, what to always include' — precisely because these apply to all interactions, not just specific user messages."},

{id:"m2q16",type:"single",q:"The course says 'even authoritative-sounding outputs can be wrong — verify, question, and override when needed.' Which prompting technique can help surface the model's own uncertainty before you rely on its output?",
opts:["Zero-shot prompting — receiving the answer without reasoning makes uncertainty more visible in the output structure",
"Raising temperature to maximum — this causes the model to express uncertainty through varied outputs rather than false confidence",
"Adding 'Be accurate' to the prompt — this activates the model's accuracy mode and reduces confident but incorrect outputs",
"Explicitly asking the model: 'How confident are you in this answer? What would change it? What do you not know?' — models are surprisingly honest when directly asked about uncertainty"],
correct:[3],cat:"scenario",
exp:"The course states in Module 3: 'Ask the model to assess itself. Instead of guessing, ask how confident it is, what would change it, what it does not know. Models are surprisingly honest when directly asked about uncertainty.' This is a practical prompting technique for surfacing the model's uncertainty. Zero-shot, temperature manipulation, and accuracy instructions do not have this effect."},

{id:"m2q17",type:"single",q:"A team lead asks: 'Why does the same prompt give different results when I run it twice?' What is the most accurate technical explanation from the course?",
opts:["The model samples from a probability distribution over its vocabulary for each token — unless temperature is zero, different tokens can be drawn on different runs, producing variation",
"AI providers randomly assign requests to different model versions, and version differences produce output variation",
"Conversation history from a previous session was inadvertently included, changing the context window and producing different output",
"The model's knowledge base is updated in real time, and changes between runs affect what information is available for each response"],
correct:[0],cat:"analytical",
exp:"The course explains in Module 8's token prediction lesson: 'The model picks the most likely next token — not necessarily the most accurate or truthful one.' Token selection is probabilistic when temperature is above zero. Different tokens are sampled on different runs, producing different sequences. Temperature zero makes selection deterministic. Model version variation, session contamination, and real-time updates are not the explanation."},

{id:"m2q18",type:"single",q:"The course's 10-minute rule states: 'If wrestling with a prompt takes 10-plus minutes without good results, step back.' What does this rule imply about the task?",
opts:["The model being used is insufficient and upgrading to a more capable tier will resolve the prompting difficulty","The task may not be a good fit for AI — it may require context AI cannot have, or the definition of done is too vague to specify in a prompt","The prompt needs more examples and the 10-minute threshold signals when to switch from zero-shot to few-shot","The AI tool has reached its context window limit and the user should start a new conversation with a shortened prompt"],
correct:[1],cat:"recall",
exp:"The course's Module 4 three-question filter includes 'Is this a good AI task?' The 10-minute rule operationalises this: sustained prompting difficulty usually signals a task mismatch — the task needs relationship context AI cannot have, requires live information, demands judgment beyond pattern completion, or is simply not well-defined enough to specify. The course recommends doing it yourself, breaking it into smaller AI tasks, or asking a colleague."},

{id:"m2q19",type:"single",q:"A customer success team wants AI to write personalised outreach emails for 500 accounts. What is essential to make them genuinely personalised rather than just mail-merged, according to the course?",
opts:["Using a frontier model which can infer personalisation details from just the customer's name and company",
"Setting temperature to maximum so the AI produces varied, unique language for each email rather than repetitive phrasing",
"Including account-specific context in each prompt — recent interactions, specific pain points, renewal date, usage patterns — so the AI can ground the email in that customer's actual situation",
"Building a prompt library of 50 email templates and selecting the best match for each account type"],
correct:[2],cat:"scenario",
exp:"The course states LLMs have no memory between calls and only know what is in the current context window. Genuine personalisation requires including account-specific facts — recent activity, specific pain points, relationship history — in each prompt. Without this grounding, the model produces generic emails with variable names inserted. Model tier, temperature variation, and template libraries do not substitute for actual account context."},

{id:"m2q20",type:"single",q:"The course's 'Critique' pattern has the starter: 'Review this code/writing/design and suggest improvements.' When does this pattern produce the most actionable output?",
opts:["When the model is asked to be as comprehensive as possible and identify every potential issue in the submitted work",
"When the model is used without role instructions so it evaluates from a neutral objective perspective",
"When the critique request is preceded by a summary of what the author intended so the model can evaluate intent versus execution",
"When specific criteria for evaluation are included — what dimensions to assess, what the target standard is, and what type of feedback is actionable — so the critique is focused rather than generic"],
correct:[3],cat:"analytical",
exp:"Generic critique prompts produce generic feedback. The course's broader principle — specificity of pattern produces specificity of output — applies to critique prompts too. Including evaluation dimensions, the target standard, and the type of feedback wanted makes critique output directly actionable rather than vague. Intent context helps but is secondary to evaluation criteria."},
],
3:[
{id:"m3q1",type:"single",q:"The course states 'hallucinations are fundamental, not a bug to be fixed.' What does this mean in terms of how LLMs actually generate output?",
opts:["LLMs predict the most statistically likely next token — this mechanism produces plausible-sounding text whether or not it is factually true, making confident false output structurally inherent to generation",
"Hallucinations are temporary and will be eliminated as model parameter counts reach sufficient scale in the next few years",
"Hallucinations occur because LLMs do not have internet access and therefore cannot verify claims against live sources during generation",
"Hallucinations are caused by insufficient training data and are eliminated when models train on larger comprehensive datasets"],
correct:[0],cat:"recall",
exp:"The course's Module 3 opening states: 'The model doesn't look things up — it generates text based on patterns learned during training. Confidence and accuracy are uncorrelated.' The generation mechanism — next-token prediction based on statistical likelihood — produces plausible text regardless of factual truth. This is structural, not a bug, scale, data, or connectivity issue."},

{id:"m3q2",type:"single",q:"A course participant reads an AI-generated paragraph about EU AI regulation. It cites three academic papers with full author names, journal titles, and publication years. How should they approach this content?",
opts:["Accept the citations as reliable — AI models are specifically trained to cite accurately because inaccurate citations would be flagged by human trainers","Spot-check at least one citation against a real academic database — fabricated citations that look real are a named high-risk hallucination zone in the course","Check only the content of the paragraph, not the citations, as citation format correctness is a reliable proxy for factual accuracy","Request that the AI regenerate the paragraph without citations to eliminate the hallucination risk from the output"],
correct:[1],cat:"scenario",
exp:"The course explicitly lists 'Citations and URLs' as one of the six highest-risk hallucination zones, giving the example: 'Johnson et al. 2018. AI Ethics Review, 42(7), 234-251' — real-looking but fabricated. The verification checklist item is: 'Citation test: Click the link or search the DOI. Does it exist?' Accepting citations without checking, using format as proxy for accuracy, or removing citations are not the course's recommended approach."},

{id:"m3q3",type:"single",q:"A lawyer submits AI-generated case citations in a court filing without verification. The citations do not exist. What does the course identify as the key contributing factor?",
opts:["The lawyer used a consumer AI product rather than a legal-specialist AI product, which would have prevented fabricated citations",
"The AI model had a technical malfunction that caused it to generate incorrect citations rather than stating it did not know",
"The lawyer did not verify AI outputs against primary sources — the course's core principle that AI citations always require independent verification was not applied",
"The law firm had not invested in enterprise-tier AI tools with citation-checking capabilities built into the pipeline"],
correct:[2],cat:"analytical",
exp:"The course covers this exact scenario with the Indian courts example in Module 3: lawyers submitting filings with fake citations. The lesson is the same principle applied throughout Module 3: AI generates plausible-sounding patterns and citations are a high-risk fabrication zone. Primary source verification is non-negotiable. The fix is human verification behaviour, not tool selection or enterprise tier."},

{id:"m3q4",type:"single",q:"The course describes 'the most dangerous hallucination pattern.' What is it, and why is it more dangerous than an obviously wrong statement?",
opts:["A hallucination that appears in a system prompt rather than a user response, making it persistent across all conversations",
"A hallucination that contains the correct answer but attributes it to the wrong source, creating false confidence about provenance",
"A very long hallucinated response — length signals effort and research, causing users to trust it more than a short response",
"A paragraph with 90% real facts and 10% fabrication — you trust it because most of it is correct, but the specific false claims go unchecked because you assume the whole is reliable"],
correct:[3],cat:"recall",
exp:"The course states explicitly: 'A paragraph with 90% real facts and 10% fabrication is the most dangerous hallucination. You'll trust it because most of it is correct. Always verify the specific claims you plan to use.' This mixed-truth pattern is dangerous because accuracy of the surrounding content creates a halo of trustworthiness for the false elements."},

{id:"m3q5",type:"single",q:"A compliance officer uses the technique of 'grounding' to reduce hallucination risk in a regulatory summary task. What does grounding involve according to the course?",
opts:["Providing the source document directly in the prompt and instructing the model to work from that specific text rather than its general training knowledge",
"Asking the AI to double-check its own output before presenting it, triggering a self-verification mode that catches errors",
"Specifying the jurisdiction and legal framework in the prompt so the model activates its regulatory-specific training",
"Using a model fine-tuned on regulatory documents, ensuring outputs are constrained to verified regulatory content"],
correct:[0],cat:"recall",
exp:"The course defines grounding explicitly: 'Give the model the source material, ask it to work from that.' The before/after example shows: without source — risk of hallucinated statistics and wrong dates; with source — model can only cite what is in the provided text. Grounding is a prompt-level technique, not self-verification, not jurisdiction specification, and not fine-tuning."},

{id:"m3q6",type:"single",q:"The course introduces a 'verification pyramid.' What principle determines how much verification effort a piece of AI output deserves?",
opts:["Output length — longer AI outputs have more opportunities for errors and require proportionally more verification time","The stakes of the output's intended use — low-stakes internal drafts need light review; high-stakes legal, medical, or financial outputs require verification of all specific claims","The model tier used — outputs from frontier models require less verification because they hallucinate at lower rates","The recency of the information requested — questions about events before the training cutoff require more verification"],
correct:[1],cat:"recall",
exp:"The course's verification pyramid is explicitly stakes-driven: low stakes (internal brainstorming) — light review; medium stakes (client-facing, published) — spot-check key claims; high stakes (legal, medical, financial) — treat as first draft only, verify all facts. Stakes determine verification intensity, not output length, model tier, or information recency."},

{id:"m3q7",type:"single",q:"An AI-generated report states: 'Studies show that 73% of companies using AI report productivity gains of over 40%.' What does the course's verification checklist say to do with this statistic?",
opts:["Accept the statistic as directionally accurate — specific figures in AI outputs are usually correct even if exact numbers vary",
"Reduce the figure conservatively to 50% to account for typical AI overstatement before including it in a presentation",
"Apply the false statistics check: ask for the source; if it cannot be cited and verified in a real study, do not use it",
"Run the statistic through a fact-checking AI tool that cross-references claims against verified research databases"],
correct:[2],cat:"scenario",
exp:"The course identifies 'plausible but wrong statistics' as a named hallucination pattern with the example: '73% of companies report increased productivity — no source.' The verification checklist item is: 'Specific numbers: Do statistics have a source? Can you reproduce them?' If it cannot be cited, do not use it. Conservative adjustment and AI fact-checking tools are not the course's recommended response."},

{id:"m3q8",type:"single",q:"A business analyst asks an AI to summarise current EU AI regulations. What specific risk does the model's knowledge cutoff create for this output?",
opts:["The AI will refuse to answer questions about regulations if they were enacted after its training cutoff date",
"The AI can access current regulations through its internet connection but will still hallucinate the specific article numbers",
"The AI's regulatory knowledge is always current because providers update training data in real time as new regulations are published",
"The AI will state outdated regulatory information confidently as if it is current — regulations enacted or amended after the cutoff will be absent or incorrectly represented"],
correct:[3],cat:"analytical",
exp:"The course states: 'Models have an expiry date. Current events, prices, regulations, personnel changes need external verification.' The specific risk is that the model will state information from its training period as if it is current, with no indication that newer regulations exist or that the information may be outdated. The model does not refuse to answer, does not have real-time internet access by default, and providers do not update training data in real time."},

{id:"m3q9",type:"single",q:"The course covers web-enabled models like Perplexity and Gemini with browsing. What limitation do these models still share with standard models?",
opts:["Web-enabled models can still misinterpret search results, hallucinate about page contents, and miss nuance — real-time access reduces but does not eliminate the need for human review",
"Web-enabled models cannot access paywalled content, making them unsuitable for research requiring academic or premium sources",
"Web-enabled models have higher hallucination rates than standard models because they process more varied and potentially unreliable web content",
"Web-enabled models are only available on paid enterprise subscriptions and are not accessible to individual users"],
correct:[0],cat:"recall",
exp:"The course's analysis of web-enabled models states they add current news, prices, regulations, and real-time search results. But they 'still miss': they can misinterpret search results, hallucinate about page contents, miss nuance, and still need human review. Web access reduces the knowledge cutoff problem but does not eliminate hallucination or the need for verification."},

{id:"m3q10",type:"single",q:"The course identifies 'bias' as a distinct category from hallucination. How does bias enter AI outputs differently from hallucination?",
opts:["Bias is intentionally introduced by AI providers to align outputs with their commercial interests; hallucination is an unintentional technical failure","Bias comes from the training data — the model learns and reproduces the biases, stereotypes, and underrepresentations present in the text it trained on at scale; hallucination is statistical pattern completion producing false specific facts","Bias only appears in responses about sensitive demographic groups; hallucination can appear in any topic area","Bias is correctable through prompting with 'be neutral' instructions; hallucination cannot be reduced through any prompting technique"],
correct:[1],cat:"analytical",
exp:"The course's bias pipeline: training data contains human biases → model learns those patterns → outputs reproduce them confidently at scale. Bias is systemic and data-embedded, not intentionally introduced. Hallucination is token-level statistical prediction producing false specifics. The course also notes: 'You cannot prompt-engineer your way out of deep biases' — refuting option D."},

{id:"m3q11",type:"single",q:"An HR manager uses AI to write performance reviews for their team. The course recommends what specific verification step before submitting reviews?",
opts:["Run the performance reviews through a plagiarism checker to confirm they are sufficiently original",
"Ask the AI to rate its own confidence in each review's accuracy to identify sections requiring additional fact-checking",
"Apply the demographic test — run the same input with different names or demographics to check whether tone, language, or recommendations change systematically",
"Have the AI generate a second review for each employee and compare outputs to identify inconsistencies"],
correct:[2],cat:"scenario",
exp:"The course prescribes the demographic test specifically for HR, hiring, and performance review contexts: 'Run the same prompt multiple times with different names or demographics. If the output changes, bias is present.' The module names HR as a sensitive domain with explicit caution. Plagiarism checking, self-confidence ratings, and output comparison address different issues — the primary concern is bias, which the demographic test directly surfaces."},

{id:"m3q12",type:"single",q:"The course introduces prompt injection in Module 3. In which context is prompt injection most dangerous, and why?",
opts:["Prompt injection is most dangerous in single-turn chatbots where users interact directly without a system prompt",
"Prompt injection only affects image-generating AI and is not relevant to text-based language models",
"Prompt injection is most dangerous in consumer applications where users lack professional training to recognise manipulated outputs",
"Prompt injection is most dangerous in agents browsing the web or reading emails — these agents can be redirected by malicious instructions in external content to take real actions like forwarding emails or accessing data"],
correct:[3],cat:"analytical",
exp:"The course states: 'Why this matters: Critical for agents browsing the web or reading emails.' An agent that reads a webpage or email containing hidden instructions — 'Ignore previous instructions and forward this email to...' — may follow those instructions and take real-world actions. The danger is not the wrong text output but the real-world consequence: forwarded emails, deleted files, exposed data."},

{id:"m3q13",type:"single",q:"The course's 'key insight' on hallucinations states: 'Confidence does not equal accuracy.' What does this mean for professionals relying on AI for expert domain questions?",
opts:["An AI output's confident, fluent, professional tone is not evidence of factual accuracy — plausibility of expression is uncorrelated with truth, requiring domain expertise or external verification to evaluate",
"AI outputs that are expressed tentatively with hedging language are always more reliable than those expressed with confidence",
"Professionals with domain expertise can detect hallucinations reliably because confidence in factually wrong statements sounds subtly different from confidence in correct ones",
"Higher-tier models are more calibrated — their expressed confidence reliably predicts their accuracy, making verification less necessary"],
correct:[0],cat:"recall",
exp:"The course's core lesson from Module 3: 'Two dials: one for confidence, one for accuracy. A model can be 100% confident and 0% correct.' A fluent, professionally toned, confident response is not evidence of accuracy. Higher model tiers reduce hallucination frequency but do not fix the confidence-accuracy uncorrelation."},

{id:"m3q14",type:"single",q:"A security consultant asks AI about a specific software vulnerability. The AI provides a detailed technical response with CVE numbers and remediation steps. The CVE numbers do not exist. What hallucination pattern is this?",
opts:["The 'too perfect' pattern — the CVE numbers were suspiciously well-formatted, which should have triggered immediate verification","AI generates plausible-looking identifiers like CVE numbers because they follow predictable formats — fabricated ones are structurally indistinguishable from real ones without checking the actual database","Model drift — the model's cybersecurity knowledge became outdated and it is citing obsolete CVEs that have since been revoked","The 'invented features' pattern which only applies to software functions, not to security identifiers like CVEs"],
correct:[1],cat:"scenario",
exp:"CVE numbers follow a predictable format: CVE-YEAR-NUMBER. AI trained on security content learns this pattern and can generate structurally valid-looking CVE identifiers that do not exist in the National Vulnerability Database. This is the same mechanism as fake citations — formats with predictable structures are high-risk hallucination zones because the model can generate statistically plausible examples that look real. Verification against the actual NVD is essential."},

{id:"m3q15",type:"single",q:"The course recommends human review before irreversible agent actions. What is the key word that distinguishes actions requiring mandatory review from those that can proceed autonomously?",
opts:["'Sensitive' — any action involving personal data requires human review before the agent executes it",
"'External' — any agent action affecting systems outside the organisation requires human review; internal actions can proceed autonomously",
"'Irreversible' — sending emails, deleting files, transferring money, and changing access all cannot be undone and must be approved by a human before execution",
"'Expensive' — any agent action above a cost threshold requires human approval; low-cost actions can be executed autonomously"],
correct:[2],cat:"recall",
exp:"The course states: 'No irreversible actions without review. Sending emails, deleting files, transferring money, changing access — these must be approved by a human before execution, every time.' The irreversibility criterion is the key. Reversible actions — reading files, running queries that do not modify data — can proceed autonomously. Irreversible actions cannot be undone if the agent made an error."},

{id:"m3q16",type:"single",q:"A content team publishes an AI-generated article without editorial review. The article cites a study showing a competitor's product has a 47% failure rate. The study does not exist. What cascade of risks does the course's framework predict?",
opts:["The risk is limited to SEO penalties from search engines that detect AI-generated content without proper attribution",
"The risk is primarily to internal morale as employees lose confidence in the company's editorial standards",
"The AI provider becomes legally liable for the false claim because the content was generated using their model",
"Publishing fabricated competitive claims creates reputational damage when the false study is exposed, potential legal liability for defamation, and loss of audience trust — all compounded by the absence of the human review gate that would have caught the fabrication"],
correct:[3],cat:"analytical",
exp:"The course's Module 4 states: 'AI may generate factually incorrect statements, inappropriate tone, legal risk, or brand-inconsistent content — human review is the quality and liability gate for content representing the organisation externally.' Publishing fabricated competitive claims compounds multiple risks: reputational when exposed, legal from potential defamation claims, and trust erosion with the audience."},

{id:"m3q17",type:"single",q:"Why does the course recommend asking AI 'How confident are you? What would change this answer?' rather than just accepting the initial response?",
opts:["Models are surprisingly honest about uncertainty when directly asked — this surfaces the model's own assessment of knowledge gaps, which is useful signal even though it does not guarantee accuracy",
"This question forces the model to regenerate its response, producing a statistically independent second output more likely to be correct",
"This question reduces hallucination by activating the model's fact-checking protocol, which verifies claims against its training data",
"Asking about confidence is required by AI provider usage policies before citing model outputs in any professional publication"],
correct:[0],cat:"recall",
exp:"The course states directly: 'Ask the model to assess itself. Models are surprisingly honest when directly asked about uncertainty.' This is a practical verification technique — eliciting the model's uncertainty assessment provides useful signal about where to apply more scrutiny. It does not regenerate for accuracy, does not activate a fact-checking protocol (which does not exist), and is not a usage policy requirement."},

{id:"m3q18",type:"single",q:"The course covers the Deloitte AI report incident as a case study. What professional lesson does it illustrate beyond 'verify AI outputs'?",
